<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmacion de Citas</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #64748b;
            --border-color: #dbe4ee;
            --card-bg: #ffffff;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        body[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #111827;
            --text-primary: #e5e7eb;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --card-bg: #1e293b;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ===== TOPBAR ===== */
        .topbar {
            background: linear-gradient(90deg, #0b1f3a, #133a74);
            color: #fff;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.2);
            position: sticky;
            top: 0;
            z-index: 9999;
            width: 100%;
        }

        .topbar img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .topbar .title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: .3px;
            flex: 1 1 auto;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .topbar .title-main { color: #fff; }

        .topbar .title-sub {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 2px;
            color: #e2e8f0;
        }

        .topbar .top-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex: 0 0 auto;
        }

        .topbar .theme-select {
            padding: 6px 8px;
            border: 1px solid rgba(255,255,255,.25);
            border-radius: 10px;
            background: transparent;
            color: #fff;
            min-width: 110px;
        }

        .topbar .theme-select option { background: #0b1f3a; color: white; }

        .topbar .btn.install {
            background: #00b894;
            color: #fff;
            border: 1px solid #00b894;
            padding: 6px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .topbar .btn.install:hover { filter: brightness(1.05); }

        /* ===== PAGE ===== */
        .page { padding: 18px; display: grid; gap: 18px; }

        /* ===== FILTERS ===== */
        .conf-filters-bar {
            display: grid;
            grid-template-columns: repeat(3, minmax(160px, 1fr));
            gap: 8px;
        }

        .conf-filters-bar select,
        .conf-filters-bar input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font: inherit;
            font-size: 13px;
        }

        /* ===== CALENDAR ===== */
        #confCalendario {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 18px;
            display: grid;
            gap: 16px;
            overflow-x: auto;
        }

        .conf-nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .conf-nav-row button {
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            font: inherit;
            font-weight: 600;
        }

        #confWeekLabel {
            font-weight: 700;
            font-size: 15px;
        }

        #confCalGrid {
            display: grid;
            grid-template-columns: repeat(6, minmax(140px, 1fr));
            gap: 8px;
        }

        .conf-weekday {
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 700;
            padding-bottom: 4px;
        }

        .conf-day-cell {
            min-height: 100px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-secondary);
            padding: 8px;
            display: grid;
            align-content: start;
            gap: 5px;
            transition: border-color 0.15s, background 0.15s;
        }

        .conf-day-cell.is-drag-over {
            border-color: #8e44ad;
            background: rgba(142, 68, 173, 0.08);
        }

        .conf-day-number {
            font-weight: 700;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .conf-day-counter {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .conf-day-items { display: grid; gap: 5px; }

        /* ===== CALENDAR CARD ===== */
        .conf-cita-card {
            border: 1px solid var(--border-color);
            border-left-width: 4px;
            border-left-color: #2563eb;
            border-radius: 8px;
            padding: 6px 8px;
            background: var(--card-bg);
            cursor: grab;
            display: grid;
            gap: 3px;
            font-size: 11px;
        }

        .conf-cita-card:active { cursor: grabbing; }
        .conf-cita-card strong { font-size: 12px; }

        /* ===== STATUS BADGES ===== */
        .status-badge {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-green  { background: #d1fae5; color: #065f46; }
        .status-red    { background: #fee2e2; color: #991b1b; }
        .status-orange { background: #ffedd5; color: #9a3412; }
        .status-blue   { background: #dbeafe; color: #1e40af; }
        .status-default { background: #f3f4f6; color: #374151; }

        body[data-theme="dark"] .status-green  { background: #064e3b; color: #6ee7b7; }
        body[data-theme="dark"] .status-red    { background: #7f1d1d; color: #fca5a5; }
        body[data-theme="dark"] .status-orange { background: #7c2d12; color: #fdba74; }
        body[data-theme="dark"] .status-blue   { background: #1e3a8a; color: #93c5fd; }
        body[data-theme="dark"] .status-default { background: #374151; color: #d1d5db; }

        /* ===== MISC ===== */
        .conf-card-note {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 720px) {
            .topbar {
                flex-direction: column !important;
                align-items: center !important;
                text-align: center;
                position: static !important;
            }
            .topbar .top-actions {
                width: 100% !important;
                justify-content: center !important;
                margin-top: 8px;
                flex-wrap: wrap;
            }
            .page { padding: 12px; }
            .conf-nav-row { flex-wrap: wrap; }
            #confCalGrid { gap: 6px; }
            .conf-filters-bar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body data-theme="auto">
    <div class="topbar">
        <img src="icons/icon-512.png" alt="Logo" width="40" height="40">
        <div class="title">
            <div class="title-main">Confirmacion de Citas CEDIS PANAMA CSS</div>
            <div class="title-sub">Actualizado: <span id="confDateTime">Cargando fecha...</span></div>
        </div>
        <div class="top-actions">
            <select id="confThemeMode" class="theme-select" title="Tema">
                <option value="auto">Sistema</option>
                <option value="light">Claro</option>
                <option value="dark">Oscuro</option>
            </select>
            <button class="btn install" type="button" onclick="window.location.href='index.html'">Volver</button>
            <button id="confRefreshBtn" class="btn install" type="button">Actualizar</button>
        </div>
    </div>

    <div class="page">
        <div id="confCalendario">
            <div class="conf-filters-bar">
                <select id="filterProveedor" title="Filtrar por proveedor">
                    <option value="">Todos los proveedores</option>
                </select>
                <input type="text" id="filterCodigo" placeholder="Buscar código...">
                <select id="filterArea" title="Filtrar por área">
                    <option value="">Todas las áreas</option>
                </select>
            </div>
            <div class="conf-nav-row">
                <button id="confPrevWeek" type="button">◀ Semana anterior</button>
                <span id="confWeekLabel"></span>
                <button id="confNextWeek" type="button">Semana siguiente ▶</button>
            </div>
            <div id="confCalGrid"></div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVw0ACNMhdN6d-JsI1lyP2iKHBVgWXI5nK3rA6blEhF3l8t2Wuwk2TpRmaanB186Dk/exec';

        const state = {
            solicitudes: [],
            currentWeekStart: null,
            dragPayload: null
        };

        // ===== UTILITIES =====

        function updateDateTime() {
            document.getElementById('confDateTime').textContent = new Date().toLocaleString('es-ES', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function applyTheme() {
            const mode = document.getElementById('confThemeMode').value;
            const resolved = mode === 'auto'
                ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : mode;
            document.body.setAttribute('data-theme', resolved);
            localStorage.setItem('confThemeMode', mode);
        }

        function loadJsonp(url, callbackName) {
            return new Promise((resolve, reject) => {
                let settled = false;
                const script = document.createElement('script');

                const timer = setTimeout(() => {
                    if (settled) return;
                    settled = true;
                    // NO borrar el callback — dejarlo como no-op para que si el
                    // script llega tarde no lance ReferenceError
                    window[callbackName] = () => {};
                    if (script.parentNode) script.parentNode.removeChild(script);
                    reject(new Error('Timeout cargando ' + callbackName));
                }, 45000);

                window[callbackName] = payload => {
                    if (settled) return;
                    settled = true;
                    clearTimeout(timer);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    resolve(payload);
                };

                script.onerror = () => {
                    if (settled) return;
                    settled = true;
                    clearTimeout(timer);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    reject(new Error('Error de red cargando ' + callbackName));
                };

                script.src = url;
                document.head.appendChild(script);
            });
        }

        // ===== DATE HELPERS =====

        function parseDateValue(value) {
            const dateTime = parseDateTimeValue(value);
            return dateTime ? stripTime(dateTime) : null;
        }

        function parseDateTimeValue(value) {
            if (!value) return null;
            if (value instanceof Date && !Number.isNaN(value.getTime())) return new Date(value);
            const text = String(value).trim();
            if (!text) return null;

            if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
                const [year, month, day] = text.split('-').map(Number);
                return new Date(year, month - 1, day);
            }

            const match = text.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
            if (match) {
                const [, day, month, year, hour = '0', minute = '0', second = '0'] = match;
                return new Date(Number(year), Number(month) - 1, Number(day), Number(hour), Number(minute), Number(second));
            }

            const date = new Date(text);
            return Number.isNaN(date.getTime()) ? null : date;
        }

        function stripTime(date) {
            const copy = new Date(date);
            copy.setHours(0, 0, 0, 0);
            return copy;
        }

        function toISODate(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // Returns the Monday of the current week
        function getMondayOfCurrentWeek() {
            const now = new Date();
            const diff = (now.getDay() + 6) % 7; // 0=Mon … 6=Sun
            const monday = new Date(now);
            monday.setDate(now.getDate() - diff);
            monday.setHours(0, 0, 0, 0);
            return monday;
        }

        // Returns the most recent Thursday at 12:00 as the weekly cutoff.
        // If today IS Thursday but before noon, returns the previous Thursday.
        function getLastThursdayCutoff() {
            const now = new Date();
            // getDay(): 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
            // daysSinceThu: Thu→0, Fri→1, Sat→2, Sun→3, Mon→4, Tue→5, Wed→6
            let daysSinceThu = (now.getDay() + 3) % 7;
            // If today is Thursday but before noon, last cutoff was the previous Thursday
            if (now.getDay() === 4 && now.getHours() < 12) {
                daysSinceThu = 7;
            }
            const lastThu = new Date(now);
            lastThu.setDate(now.getDate() - daysSinceThu);
            lastThu.setHours(12, 0, 0, 0);
            return lastThu;
        }

        // Returns next Monday from today
        function getNextMondayDate() {
            const today = stripTime(new Date());
            const day = today.getDay(); // 0=Sun … 6=Sat
            const daysToNextMon = day === 0 ? 1 : (8 - day);
            const nextMon = new Date(today);
            nextMon.setDate(today.getDate() + daysToNextMon);
            return nextMon;
        }

        function formatDisplayDate(date) {
            if (!date) return 'N/D';
            return date.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function formatSuggestedDate(date) {
            if (!date) return 'Sin fecha';
            const weekday = date.toLocaleDateString('es-ES', { weekday: 'long' });
            const datePart = date.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
            return `${weekday} ${datePart}`;
        }

        function formatDisplayDateStr(str) {
            const d = parseDateValue(str);
            return d ? formatDisplayDate(d) : (str || 'N/D');
        }

        // "12 may. – 25 may. 2026"
        function formatRangeLabel(startDate, endDate) {
            const fmt = d => d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
            const startStr = fmt(startDate);
            const endStr = endDate.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
            return `${startStr} – ${endStr}`;
        }

        // ===== TEXT HELPERS =====

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeCode(code) {
            return String(code || '').trim().toUpperCase();
        }

        function parseNumber(value) {
            const raw = String(value ?? '').trim();
            if (!raw) return 0;
            const normalized = raw.includes(',') && !raw.includes('.')
                ? raw.replace(/,/g, '.')
                : raw.replace(/,/g, '');
            const parsed = Number(normalized);
            return Number.isFinite(parsed) ? parsed : 0;
        }

        function getCitaStatusClass(estado) {
            const e = String(estado || '').toUpperCase().trim();
            if (['ASISTIO', 'ENTREGADO COMPLETO', 'CONFIRMADA',
                 'ASISTIO - ENTREGA PARCIAL', 'ASISTIO - ENTREGO OTRO PEDIDO'].includes(e)) return 'green';
            if (['NO ASISTIO', 'CANCELADA'].includes(e)) return 'red';
            if (['REPROGRAMADA', 'DIFERIDO', 'PENDIENTE X CONFIRMAR',
                 'REPROGRAMADA X PROVEEDOR', 'REPROGRAMADA X ALTO VOLUMEN',
                 'DIFERIR X FALTA DE ESPACIO'].includes(e)) return 'orange';
            if (['CITA AGENDADA', 'VERIFICAR CON PROVEEDOR'].includes(e)) return 'blue';
            return 'default';
        }

        // ===== DATA NORMALIZERS =====

        // Returns the first non-empty value found among the given keys in item.
        function getCol(item, ...keys) {
            for (const key of keys) {
                const val = item[key];
                if (val !== undefined && val !== null && String(val).trim() !== '') return val;
            }
            return '';
        }

        function normalizeSolicitud(item, index) {
            const codigo_referencia = String(
                item['Código de referencia (Abasto) [solo numeros sin guiones]'] ||
                item['codigo_referencia'] || ''
            ).trim();
            const codigoNorm = codigo_referencia.replace(/[-\s]/g, '').trim();
            return {
                id: String(item.id || `SOL-${index + 1}`),
                marca_temporal: item['Marca temporal'] || item.marca_temporal || '',
                nombre_proveedor: String(
                    item['Nombre del Proveedor'] || item['Añadir Proveedor'] ||
                    item.nombre_proveedor || ''
                ).trim(),
                codigo_referencia,
                codigo_normalizado: codigoNorm,
                descripcion_producto: String(
                    item['Descripción del producto'] || item.descripcion_producto || ''
                ).trim(),
                cantidad_unidades: parseNumber(
                    item['Cantidad (en unidades)'] || item.cantidad_unidades
                ),
                fecha_vencimiento_entrega: String(
                    item['Fecha de vencimiento de la entrega'] ||
                    item.fecha_vencimiento_entrega || ''
                ),
                fecha_solicitada: String(
                    item['Fecha de entrega solicitada'] ||
                    item.fecha_solicitada || ''
                ),
                numero_orden_compra: String(
                    item['Número de Orden de Compra'] ||
                    item.numero_orden_compra || ''
                ).trim(),
                cantidad_pallets: parseNumber(
                    item['Cantidad de pallets (si aplica)'] || item.cantidad_pallets
                ),
                tipo_ambiente: String(
                    item['Tipo de ambiente requerido'] || item.tipo_ambiente || ''
                ).trim(),
                area_correspondiente: String(
                    item['Área correspondiente'] || item.area_correspondiente || ''
                ).trim(),
                hora_solicitada: String(
                    item['Hora solicitada'] || item.hora_solicitada || ''
                ).trim(),
                estado: String(
                    item['Estado'] || item.estado || 'Por Agendar'
                ).trim(),
                inv_estado: String(item.inv_estado || ''),
                cobertura: String(item.cobertura || ''),
                inv_actual: Number(item.inv_actual || 0),
                reserva: Number(item.reserva || 0),
                demanda: Number(item.demanda || 0),
                _srcRow: Array.isArray(item._srcRow) ? item._srcRow : []
            };
        }

        // ===== FILTERS =====

        function populateFilters() {
            const proveedores = [...new Set(
                state.solicitudes.map(s => s.nombre_proveedor).filter(Boolean)
            )].sort();
            const areas = [...new Set(
                state.solicitudes.map(s => s.area_correspondiente).filter(Boolean)
            )].sort();

            const selProv = document.getElementById('filterProveedor');
            const selArea = document.getElementById('filterArea');
            // Preserve current selection if possible
            const prevProv = selProv.value;
            const prevArea = selArea.value;

            selProv.innerHTML = '<option value="">Todos los proveedores</option>' +
                proveedores.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
            selArea.innerHTML = '<option value="">Todas las áreas</option>' +
                areas.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');

            if (prevProv) selProv.value = prevProv;
            if (prevArea) selArea.value = prevArea;
        }

        function getFilteredSolicitudes() {
            let solicitudes = [...state.solicitudes];
            const filterProv = document.getElementById('filterProveedor').value;
            const filterCod = document.getElementById('filterCodigo').value.trim().toUpperCase();
            const filterArea = document.getElementById('filterArea').value;

            if (filterProv) solicitudes = solicitudes.filter(s => s.nombre_proveedor === filterProv);
            if (filterCod) {
                solicitudes = solicitudes.filter(s =>
                    String(s.codigo_referencia || '').toUpperCase().includes(filterCod) ||
                    String(s.codigo_normalizado || '').toUpperCase().includes(filterCod)
                );
            }
            if (filterArea) solicitudes = solicitudes.filter(s => s.area_correspondiente === filterArea);
            return solicitudes;
        }

        function renderCitaCardHtml(item) {
            const statusClass = getCitaStatusClass(item.estado);
            const fechaSolicitada = parseDateValue(item.fecha_solicitada);
            return `
                <div class="conf-cita-card" draggable="true" data-id="${escapeHtml(item.id)}" data-date="${escapeHtml(fechaSolicitada ? toISODate(fechaSolicitada) : '')}">
                    <strong>${escapeHtml(item.nombre_proveedor || 'N/D')}</strong>
                    <div><b>Código:</b> ${escapeHtml(item.codigo_referencia || 'N/D')}</div>
                    <div><b>Producto:</b> ${escapeHtml(item.descripcion_producto || 'N/D')}</div>
                    <div><b>Unidades:</b> ${escapeHtml(String(item.cantidad_unidades || 0))}</div>
                    <div><b>Vencimiento:</b> ${escapeHtml(formatDisplayDateStr(item.fecha_vencimiento_entrega))}</div>
                    <div><b>Entrega solicitada:</b> ${escapeHtml(formatDisplayDateStr(item.fecha_solicitada))}</div>
                    <div><b>OC:</b> ${escapeHtml(item.numero_orden_compra || 'N/D')}</div>
                    <div><b>Pallets:</b> ${escapeHtml(String(item.cantidad_pallets || 0))}</div>
                    <div><b>Ambiente:</b> ${escapeHtml(item.tipo_ambiente || 'N/D')}</div>
                    <div><b>Área:</b> ${escapeHtml(item.area_correspondiente || 'N/D')}</div>
                    <span class="status-badge status-${statusClass}">${escapeHtml(item.estado || 'N/D')}</span>
                </div>
            `;
        }

        // ===== RENDER CALENDAR =====

        function renderCalendar() {
            const grid = document.getElementById('confCalGrid');
            const weekLabel = document.getElementById('confWeekLabel');
            const weekStart = stripTime(state.currentWeekStart);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 5);
            weekLabel.textContent = formatRangeLabel(weekStart, weekEnd);

            const weekdays = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const filteredSolicitudes = getFilteredSolicitudes();
            const byDate = filteredSolicitudes.reduce((acc, item) => {
                const d = parseDateValue(item.fecha_solicitada);
                if (!d) return acc;
                const iso = toISODate(d);
                if (!acc[iso]) acc[iso] = [];
                acc[iso].push(item);
                return acc;
            }, {});

            let html = '';
            for (let i = 0; i < 6; i++) {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() + i);
                const isoDate = toISODate(date);
                const dayName = weekdays[i];
                const dayItems = byDate[isoDate] || [];
                const pallets = dayItems.reduce((sum, item) => sum + parseNumber(item.cantidad_pallets), 0);
                const dayNum = date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
                html += `
                    <div class="conf-day-cell" data-date="${isoDate}">
                        <div class="conf-day-number">${escapeHtml(dayName)} · ${escapeHtml(dayNum)}</div>
                        <div class="conf-day-counter">${dayItems.length} citas · ${pallets} pallets</div>
                        <div class="conf-day-items">${dayItems.map(renderCitaCardHtml).join('')}</div>
                    </div>
                `;
            }
            grid.innerHTML = html;

            grid.querySelectorAll('.conf-day-cell').forEach(cell => {
                cell.addEventListener('dragover', event => {
                    event.preventDefault();
                    event.dataTransfer.dropEffect = 'move';
                    cell.classList.add('is-drag-over');
                });
                cell.addEventListener('dragleave', event => {
                    if (!cell.contains(event.relatedTarget)) cell.classList.remove('is-drag-over');
                });
                cell.addEventListener('drop', async event => {
                    event.preventDefault();
                    cell.classList.remove('is-drag-over');
                    if (!state.dragPayload) return;
                    const { id, fromDate } = state.dragPayload;
                    const toDate = cell.dataset.date;
                    state.dragPayload = null;
                    if (!id || !toDate || fromDate === toDate) return;

                    const cbName = 'cbUpdate_' + Date.now();
                    try {
                        const res = await loadJsonp(
                            `${APPS_SCRIPT_URL}?action=updateCita&id=${encodeURIComponent(id)}&fecha=${toDate}&callback=${cbName}`,
                            cbName
                        );
                        if (res && res.success) {
                            const sol = state.solicitudes.find(s => String(s.id) === String(id));
                            if (sol) sol.fecha_solicitada = toDate;
                            renderCalendar();
                        } else {
                            alert('Error al actualizar: ' + (res && res.error ? res.error : 'Respuesta inesperada'));
                            renderCalendar();
                        }
                    } catch (err) {
                        alert('Error de red al actualizar cita: ' + err.message);
                        renderCalendar();
                    }
                });
            });

            grid.querySelectorAll('.conf-cita-card').forEach(card => {
                card.addEventListener('dragstart', event => {
                    state.dragPayload = { id: card.dataset.id, fromDate: card.dataset.date };
                    event.dataTransfer.effectAllowed = 'move';
                    event.dataTransfer.setData('text/plain', JSON.stringify(state.dragPayload));
                });
                card.addEventListener('dragend', () => {
                    state.dragPayload = null;
                });
            });
        }

        function handleAsyncError(error) {
            console.error(String(error));
        }

        // ===== DATA LOADING =====

        async function loadData() {
            document.getElementById('confCalGrid').innerHTML = '<div class="conf-card-note">Cargando citas...</div>';
            const citasData = await loadJsonp(
                `${APPS_SCRIPT_URL}?action=getCitasData&callback=cbCitas`,
                'cbCitas'
            ).catch(err => {
                console.warn('No se pudieron cargar citas:', err.message);
                return { success: false, data: [] };
            });

            if (!citasData.success) {
                console.warn('Error citas:', citasData.error);
            }

            const rawItems = Array.isArray(citasData)
                ? citasData
                : (Array.isArray(citasData.data) ? citasData.data : []);
            state.solicitudes = rawItems.map(normalizeSolicitud);

            populateFilters();
            renderCalendar();
        }

        // ===== INITIALIZATION =====

        document.getElementById('confThemeMode').addEventListener('change', applyTheme);
        document.getElementById('confRefreshBtn').addEventListener('click', () => loadData().catch(handleAsyncError));

        document.getElementById('confPrevWeek').addEventListener('click', () => {
            state.currentWeekStart.setDate(state.currentWeekStart.getDate() - 7);
            renderCalendar();
        });
        document.getElementById('confNextWeek').addEventListener('click', () => {
            state.currentWeekStart.setDate(state.currentWeekStart.getDate() + 7);
            renderCalendar();
        });

        document.getElementById('filterProveedor').addEventListener('change', renderCalendar);
        document.getElementById('filterCodigo').addEventListener('input', renderCalendar);
        document.getElementById('filterArea').addEventListener('change', renderCalendar);

        const savedThemeMode = localStorage.getItem('confThemeMode') || 'auto';
        document.getElementById('confThemeMode').value = savedThemeMode;
        applyTheme();
        updateDateTime();
        setInterval(updateDateTime, 60000);

        state.currentWeekStart = getNextMondayDate();
        loadData().catch(handleAsyncError);
    </script>
</body>
</html>
