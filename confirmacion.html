<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmacion de Citas</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #64748b;
            --border-color: #dbe4ee;
            --card-bg: #ffffff;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        body[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #111827;
            --text-primary: #e5e7eb;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --card-bg: #1e293b;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ===== TOPBAR ===== */
        .topbar {
            background: linear-gradient(90deg, #0b1f3a, #133a74);
            color: #fff;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.2);
            position: sticky;
            top: 0;
            z-index: 9999;
            width: 100%;
        }

        .topbar img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .topbar .title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: .3px;
            flex: 1 1 auto;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .topbar .title-main { color: #fff; }

        .topbar .title-sub {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 2px;
            color: #e2e8f0;
        }

        .topbar .top-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex: 0 0 auto;
        }

        .topbar .theme-select {
            padding: 6px 8px;
            border: 1px solid rgba(255,255,255,.25);
            border-radius: 10px;
            background: transparent;
            color: #fff;
            min-width: 110px;
        }

        .topbar .theme-select option { background: #0b1f3a; color: white; }

        .topbar .btn.install {
            background: #00b894;
            color: #fff;
            border: 1px solid #00b894;
            padding: 6px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .topbar .btn.install:hover { filter: brightness(1.05); }

        /* ===== PAGE ===== */
        .page { padding: 18px; display: grid; gap: 18px; }

        /* ===== LAYOUT ===== */
        .conf-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 18px;
            align-items: start;
        }

        /* ===== SIDEBAR ===== */
        #confSidebar {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: sticky;
            top: 82px;
            max-height: calc(100vh - 100px);
        }

        #confSidebar h3 { font-size: 18px; }

        /* ===== FILTERS ===== */
        .conf-filters-bar { display: grid; gap: 8px; }

        .conf-filters-bar select,
        .conf-filters-bar input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font: inherit;
            font-size: 13px;
        }

        /* ===== SIDEBAR LIST ===== */
        #confSidebarList {
            flex: 1;
            overflow-y: auto;
            display: grid;
            gap: 10px;
            align-content: start;
            padding-right: 4px;
        }

        /* ===== PENDING CARD (table-like design) ===== */
        .conf-pending-card {
            border-left: 6px solid;
            border-radius: 12px;
            cursor: grab;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.15s;
        }

        .conf-pending-card:active { cursor: grabbing; }
        .conf-pending-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }

        .urgency-badge {
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.6px;
            text-align: center;
        }

        .card-section-header {
            padding: 5px 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .card-section-form { background: #4a235a; color: #fff; }
        .card-section-inv  { background: #7d3c98; color: #fff; }
        .card-section-header-form { background: #3b1a4a; color: #e9d5ff; }
        .card-section-header-inv  { background: #6a3285; color: #e9d5ff; }

        .card-table { width: 100%; border-collapse: collapse; }
        .card-table td {
            padding: 4px 10px;
            font-size: 11px;
            line-height: 1.5;
            vertical-align: top;
        }

        .card-table td.card-label {
            width: 50%;
            font-weight: 600;
            opacity: 0.82;
            white-space: nowrap;
        }

        .card-table td.card-value {
            width: 50%;
            font-weight: 400;
            word-break: break-word;
        }

        .card-suggested-row td {
            background: rgba(255,255,255,0.12);
            font-weight: 700;
            padding: 5px 10px;
        }

        /* ===== CALENDAR ===== */
        #confCalendario {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 18px;
            display: grid;
            gap: 16px;
            overflow-x: auto;
        }

        .conf-nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .conf-nav-row button {
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            font: inherit;
            font-weight: 600;
        }

        #confWeekLabel {
            font-weight: 700;
            font-size: 15px;
        }

        #confCalGrid {
            display: grid;
            grid-template-columns: repeat(7, minmax(110px, 1fr));
            gap: 8px;
        }

        .conf-weekday {
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 700;
            padding-bottom: 4px;
        }

        .conf-day-cell {
            min-height: 100px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-secondary);
            padding: 8px;
            display: grid;
            align-content: start;
            gap: 5px;
            transition: border-color 0.15s, background 0.15s;
        }

        .conf-day-cell.is-drag-over {
            border-color: #8e44ad;
            background: rgba(142, 68, 173, 0.08);
        }

        .conf-day-number {
            font-weight: 700;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .conf-day-items { display: grid; gap: 5px; }

        /* ===== CALENDAR CARD ===== */
        .conf-cita-card {
            border: 1px solid var(--border-color);
            border-left-width: 4px;
            border-left-color: #2563eb;
            border-radius: 8px;
            padding: 6px 8px;
            background: var(--card-bg);
            cursor: grab;
            display: grid;
            gap: 3px;
            font-size: 11px;
        }

        .conf-cita-card:active { cursor: grabbing; }
        .conf-cita-card strong { font-size: 12px; }

        /* ===== STATUS BADGES ===== */
        .status-badge {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-green  { background: #d1fae5; color: #065f46; }
        .status-red    { background: #fee2e2; color: #991b1b; }
        .status-orange { background: #ffedd5; color: #9a3412; }
        .status-blue   { background: #dbeafe; color: #1e40af; }
        .status-default { background: #f3f4f6; color: #374151; }

        body[data-theme="dark"] .status-green  { background: #064e3b; color: #6ee7b7; }
        body[data-theme="dark"] .status-red    { background: #7f1d1d; color: #fca5a5; }
        body[data-theme="dark"] .status-orange { background: #7c2d12; color: #fdba74; }
        body[data-theme="dark"] .status-blue   { background: #1e3a8a; color: #93c5fd; }
        body[data-theme="dark"] .status-default { background: #374151; color: #d1d5db; }

        /* ===== MISC ===== */
        .conf-pending-meta,
        .conf-empty-state,
        .conf-card-note {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .conf-primary-btn,
        .conf-secondary-btn {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        .conf-primary-btn { background: #8e44ad; color: #fff; }
        .conf-secondary-btn { background: #e2e8f0; color: #0f172a; }
        body[data-theme="dark"] .conf-secondary-btn { background: #334155; color: #e5e7eb; }

        /* ===== MODAL ===== */
        #confModalOverlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10000;
        }

        #confModalOverlay.is-open { display: flex; }

        .conf-modal {
            width: min(100%, 520px);
            background: var(--card-bg);
            border-radius: 18px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            padding: 20px;
            display: grid;
            gap: 14px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .conf-modal label {
            display: grid;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .conf-modal input,
        .conf-modal select,
        .conf-modal textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .conf-modal textarea { min-height: 80px; resize: vertical; }

        .conf-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 960px) {
            .conf-layout { grid-template-columns: 1fr; }
            #confSidebar { position: static; max-height: none; }
        }

        @media (max-width: 720px) {
            .topbar {
                flex-direction: column !important;
                align-items: center !important;
                text-align: center;
                position: static !important;
            }
            .topbar .top-actions {
                width: 100% !important;
                justify-content: center !important;
                margin-top: 8px;
                flex-wrap: wrap;
            }
            .page { padding: 12px; }
            .conf-nav-row { flex-wrap: wrap; }
            #confCalGrid { gap: 6px; }
        }
    </style>
</head>
<body data-theme="auto">
    <div class="topbar">
        <img src="icons/icon-512.png" alt="Logo" width="40" height="40">
        <div class="title">
            <div class="title-main">Confirmacion de Citas CEDIS PANAMA CSS</div>

            <button class="btn install" type="button" onclick="window.location.href='index.html'">Volver</button>

    <div class="page">
        <div class="conf-layout">
            <div id="confSidebar">
                <h3>Solicitudes Pendientes</h3>
                <div class="conf-filters-bar">
                    <select id="filterProveedor" title="Filtrar por proveedor">

                    </select>
                    <input type="text" id="filterCodigo" placeholder="Buscar código...">
                    <select id="filterArea" title="Filtrar por área">

                    </select>
                </div>
                <div id="confSidebarList"></div>
            </div>

            <div id="confCalendario">
                <div class="conf-nav-row">

    </div>

    <div id="confModalOverlay" aria-hidden="true">
        <div class="conf-modal" onclick="event.stopPropagation()">
            <div>
                <h3>Confirmar cita</h3>
                <p id="confModalTitle" class="conf-card-note">Selecciona fecha, hora y estado.</p>
            </div>
            <label>
                <span>Fecha</span>

            </label>
            <label>
                <span>Hora</span>
                <input type="time" id="confModalHora">
            </label>
            <label>
                <span>Estado</span>
                <select id="confModalEstado">
                    <option value="CITA AGENDADA">CITA AGENDADA</option>
                    <option value="CONFIRMADA">CONFIRMADA</option>
                    <option value="PENDIENTE X CONFIRMAR">PENDIENTE X CONFIRMAR</option>
                    <option value="ASISTIO">ASISTIO</option>
                    <option value="ASISTIO - ENTREGA PARCIAL">ASISTIO - ENTREGA PARCIAL</option>
                    <option value="ASISTIO - ENTREGO OTRO PEDIDO">ASISTIO - ENTREGO OTRO PEDIDO</option>
                    <option value="NO ASISTIO">NO ASISTIO</option>
                    <option value="ENTREGADO COMPLETO">ENTREGADO COMPLETO</option>
                    <option value="ENTREGADO INCONFORME">ENTREGADO INCONFORME</option>
                    <option value="REPROGRAMADA">REPROGRAMADA</option>
                    <option value="REPROGRAMADA X PROVEEDOR">REPROGRAMADA X PROVEEDOR</option>
                    <option value="REPROGRAMADA X ALTO VOLUMEN">REPROGRAMADA X ALTO VOLUMEN</option>
                    <option value="DIFERIDO">DIFERIDO</option>
                    <option value="DIFERIR X FALTA DE ESPACIO">DIFERIR X FALTA DE ESPACIO</option>
                    <option value="CANCELADA">CANCELADA</option>
                    <option value="VERIFICAR CON PROVEEDOR">VERIFICAR CON PROVEEDOR</option>

                <span>Observaciones</span>

            <div class="conf-modal-actions">
                <button id="confModalCancelar" class="conf-secondary-btn" type="button">Cancelar</button>
                <button id="confModalConfirmar" class="conf-primary-btn" type="button">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVw0ACNMhdN6d-JsI1lyP2iKHBVgWXI5nK3rA6blEhF3l8t2Wuwk2TpRmaanB186Dk/exec';
        const COVERAGE_SCRIPT_URL = 'https://script.google.com/macros/s/[URL_DEL_SCRIPT_DE_CURVAS]/exec';

        // Inventory rank: lower = higher priority
        const INV_RANK = { AGOTADO: 1, CRITICO: 2, BAJO: 3, OPTIMO: 4, EXCESO: 5 };

        const state = {
            solicitudes: [],
            citas: [],
            abastecimiento: {},   // map: normalizedCode → { cobertura, estado, inv_actual, reserva, demanda }
            currentWeekStart: null,
            activeSolicitudId: null,
            dragPayload: null
        };

        // ===== UTILITIES =====

        function updateDateTime() {
            document.getElementById('confDateTime').textContent = new Date().toLocaleString('es-ES', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function applyTheme() {
            const mode = document.getElementById('confThemeMode').value;
            const resolved = mode === 'auto'
                ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : mode;
            document.body.setAttribute('data-theme', resolved);
            localStorage.setItem('confThemeMode', mode);
        }

        function loadJsonp(url, callbackName) {
            return new Promise((resolve, reject) => {
                let settled = false;
                const script = document.createElement('script');

                const timer = setTimeout(() => {
                    if (settled) return;
                    settled = true;
                    // NO borrar el callback — dejarlo como no-op para que si el
                    // script llega tarde no lance ReferenceError
                    window[callbackName] = () => {};
                    if (script.parentNode) script.parentNode.removeChild(script);
                    reject(new Error('Timeout cargando ' + callbackName));
                }, 45000);

                window[callbackName] = payload => {
                    if (settled) return;
                    settled = true;
                    clearTimeout(timer);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    resolve(payload);
                };

                script.onerror = () => {
                    if (settled) return;
                    settled = true;
                    clearTimeout(timer);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    reject(new Error('Error de red cargando ' + callbackName));
                };

                script.src = url;
                document.head.appendChild(script);
            });
        }

        // ===== DATE HELPERS =====

        function parseDateValue(value) {
            const dateTime = parseDateTimeValue(value);
            return dateTime ? stripTime(dateTime) : null;
        }

        function parseDateTimeValue(value) {
            if (!value) return null;
            if (value instanceof Date && !Number.isNaN(value.getTime())) return new Date(value);
            const text = String(value).trim();
            if (!text) return null;

            if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
                const [year, month, day] = text.split('-').map(Number);
                return new Date(year, month - 1, day);
            }

            const match = text.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
            if (match) {
                const [, day, month, year, hour = '0', minute = '0', second = '0'] = match;
                return new Date(Number(year), Number(month) - 1, Number(day), Number(hour), Number(minute), Number(second));
            }

            const date = new Date(text);
            return Number.isNaN(date.getTime()) ? null : date;
        }

        function stripTime(date) {
            const copy = new Date(date);
            copy.setHours(0, 0, 0, 0);
            return copy;
        }

        function toISODate(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // Returns the Monday of the current week
        function getMondayOfCurrentWeek() {
            const now = new Date();
            const diff = (now.getDay() + 6) % 7; // 0=Mon … 6=Sun
            const monday = new Date(now);
            monday.setDate(now.getDate() - diff);
            monday.setHours(0, 0, 0, 0);
            return monday;
        }

        // Returns the most recent Thursday at 12:00 as the weekly cutoff.
        // If today IS Thursday but before noon, returns the previous Thursday.
        function getLastThursdayCutoff() {
            const now = new Date();
            // getDay(): 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
            // daysSinceThu: Thu→0, Fri→1, Sat→2, Sun→3, Mon→4, Tue→5, Wed→6
            let daysSinceThu = (now.getDay() + 3) % 7;
            // If today is Thursday but before noon, last cutoff was the previous Thursday
            if (now.getDay() === 4 && now.getHours() < 12) {
                daysSinceThu = 7;
            }
            const lastThu = new Date(now);
            lastThu.setDate(now.getDate() - daysSinceThu);
            lastThu.setHours(12, 0, 0, 0);
            return lastThu;
        }

        // Returns next Monday from today
        function getNextMondayDate() {
            const today = stripTime(new Date());
            const day = today.getDay(); // 0=Sun … 6=Sat
            const daysToNextMon = day === 0 ? 1 : (8 - day);
            const nextMon = new Date(today);
            nextMon.setDate(today.getDate() + daysToNextMon);
            return nextMon;
        }

        function formatDisplayDate(date) {
            if (!date) return 'N/D';
            return date.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function formatSuggestedDate(date) {
            if (!date) return 'Sin fecha';
            const weekday = date.toLocaleDateString('es-ES', { weekday: 'long' });
            const datePart = date.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
            return `${weekday} ${datePart}`;
        }

        function formatDisplayDateStr(str) {
            const d = parseDateValue(str);
            return d ? formatDisplayDate(d) : (str || 'N/D');
        }

        // "12 may. – 25 may. 2026"
        function formatRangeLabel(startDate, endDate) {
            const fmt = d => d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
            const startStr = fmt(startDate);
            const endStr = endDate.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
            return `${startStr} – ${endStr}`;
        }

        // ===== TEXT HELPERS =====

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeCode(code) {
            return String(code || '').trim().toUpperCase();
        }

        function parseNumber(value) {
            const raw = String(value ?? '').trim();
            if (!raw) return 0;
            const normalized = raw.includes(',') && !raw.includes('.')
                ? raw.replace(/,/g, '.')
                : raw.replace(/,/g, '');
            const parsed = Number(normalized);
            return Number.isFinite(parsed) ? parsed : 0;
        }

        // ===== PRIORITY & URGENCY =====

        function calcPriority(solicitud) {
            const inv = state.abastecimiento[solicitud.codigo_normalizado] || null;
            const estado = inv ? String(inv.estado || '').toUpperCase().trim() : '';
            const coberturaRaw = inv ? parseFloat(String(inv.cobertura || '0')) : null;
            const invRank = INV_RANK[estado] || 3; // sin datos treated as BAJO

            const fechaVenc = parseDateValue(solicitud.fecha_vencimiento);
            const today = stripTime(new Date());
            const daysToVenc = fechaVenc !== null ? Math.round((fechaVenc - today) / 86400000) : null;
            const fechaSolicitada = parseDateValue(solicitud.fecha_solicitada);

            return { invRank, cobertura: coberturaRaw, daysToVenc, estado, fechaSolicitada };
        }

        function sortSolicitudes(list) {
            return [...list].sort((a, b) => {
                const pa = a._priority, pb = b._priority;
                // 1. Inventory state rank (lower = more urgent)
                if (pa.invRank !== pb.invRank) return pa.invRank - pb.invRank;
                // 2. Coverage (lower = more urgent)
                const covA = pa.cobertura !== null ? pa.cobertura : 9999;
                const covB = pb.cobertura !== null ? pb.cobertura : 9999;
                if (covA !== covB) return covA - covB;
                // 3. Days to OC expiry (sooner = more urgent)
                const dvA = pa.daysToVenc !== null ? pa.daysToVenc : 9999;
                const dvB = pb.daysToVenc !== null ? pb.daysToVenc : 9999;
                if (dvA !== dvB) return dvA - dvB;
                // 4. Requested date (sooner = more urgent)
                const fsA = pa.fechaSolicitada ? pa.fechaSolicitada.getTime() : Infinity;
                const fsB = pb.fechaSolicitada ? pb.fechaSolicitada.getTime() : Infinity;
                return fsA - fsB;
            });
        }

        function getSuggestedDate(solicitud, priority) {
            const { estado, fechaSolicitada } = priority;
            const today = stripTime(new Date());
            const e = (estado || '').toUpperCase().trim();

            if (e === 'AGOTADO' || e === 'CRITICO') {
                return getNextMondayDate();
            }
            if (e === 'BAJO') {
                if (fechaSolicitada) {
                    const twoEarlier = new Date(fechaSolicitada);
                    twoEarlier.setDate(fechaSolicitada.getDate() - 2);
                    return twoEarlier >= today ? twoEarlier : fechaSolicitada;
                }
            }
            return fechaSolicitada;
        }

        function getUrgencyBadge(priority) {
            const { daysToVenc } = priority;
            // Default to BAJO when no inventory data
            const e = (priority.estado || 'BAJO').toUpperCase().trim();
            const dv = typeof daysToVenc === 'number' ? daysToVenc : 9999;

            if (e === 'AGOTADO' || e === 'CRITICO') {
                return { emoji: '🔴', text: 'URGENTE', color: '#e74c3c' };
            }
            if (e === 'BAJO' || dv <= 7) {
                return { emoji: '🟠', text: 'PRIORITARIO', color: '#f39c12' };
            }
            if (e === 'OPTIMO' || (dv > 7 && dv <= 21)) {
                return { emoji: '🟡', text: 'NORMAL', color: '#f1c40f' };
            }
            return { emoji: '🟢', text: 'PUEDE ESPERAR', color: '#27ae60' };
        }

        function getInvStatusColor(estado) {
            switch ((estado || '').toUpperCase().trim()) {
                case 'AGOTADO': return '#e74c3c';
                case 'CRITICO': return '#f39c12';
                case 'BAJO':    return '#f1c40f';
                case 'OPTIMO':  return '#27ae60';
                case 'EXCESO':  return '#2980b9';
                default:        return '#94a3b8';
            }
        }

        function getCitaStatusClass(estado) {
            const e = String(estado || '').toUpperCase().trim();
            if (['ASISTIO', 'ENTREGADO COMPLETO', 'CONFIRMADA',
                 'ASISTIO - ENTREGA PARCIAL', 'ASISTIO - ENTREGO OTRO PEDIDO'].includes(e)) return 'green';
            if (['NO ASISTIO', 'CANCELADA'].includes(e)) return 'red';
            if (['REPROGRAMADA', 'DIFERIDO', 'PENDIENTE X CONFIRMAR',
                 'REPROGRAMADA X PROVEEDOR', 'REPROGRAMADA X ALTO VOLUMEN',
                 'DIFERIR X FALTA DE ESPACIO'].includes(e)) return 'orange';
            if (['CITA AGENDADA', 'VERIFICAR CON PROVEEDOR'].includes(e)) return 'blue';
            return 'default';
        }

        // ===== DATA NORMALIZERS =====

        // Returns the first non-empty value found among the given keys in item.
        function getCol(item, ...keys) {
            for (const key of keys) {
                const val = item[key];
                if (val !== undefined && val !== null && String(val).trim() !== '') return val;
            }
            return '';
        }

        function normalizeSolicitud(item, index) {
            const codigo_referencia = String(getCol(item,
                'codigo_referencia', 'Código de referencia', 'Codigo', 'codigo', 'CODIGO') || '').trim();
            const codigoNorm = codigo_referencia.replace(/-/g, '').trim();
            const inv = state.abastecimiento[codigoNorm] || null;
            return {
                id: String(item.id || `SOL-${index + 1}`),
                marca_temporal: item.marca_temporal || item.timestamp || '',
                fecha_solicitada: String(getCol(item,
                    'fecha_solicitada', 'fecha_entrega_solicitada',
                    'Fecha entrega solicitada', 'Fecha Solicitada') || ''),
                fecha_vencimiento: item.fecha_vencimiento || '',
                hora_solicitada: String(item.hora_solicitada || '').trim(),
                nombre_proveedor: String(getCol(item,
                    'nombre_proveedor', 'Nombre del Proveedor', 'Proveedor',
                    'proveedor', 'añadir_proveedor') || '').trim(),
                numero_orden_compra: String(getCol(item,
                    'numero_orden_compra', 'Número de Orden de Compra',
                    'OC', 'orden_compra', 'oc') || '').trim(),
                codigo_referencia,
                codigo_normalizado: codigoNorm,
                descripcion_producto: String(getCol(item,
                    'descripcion_producto', 'Descripción del producto',
                    'Descripcion', 'descripcion') || '').trim(),
                cantidad_unidades: parseNumber(getCol(item,
                    'cantidad_unidades', 'Cantidad (en unidades)', 'Cantidad', 'cantidad')),
                cantidad_bultos: parseNumber(item.cantidad_bultos),
                cantidad_pallets: parseNumber(item.cantidad_pallets),
                tipo_ambiente: String(item.tipo_ambiente || '').trim(),
                area_correspondiente: String(item.area_correspondiente || '').trim(),
                nombre_solicitante: String(item.nombre_solicitante || '').trim(),
                correo_solicitante: String(item.correo_solicitante || item.correo || '').trim(),
                telefono: String(item.telefono || '').trim(),
                tipo_unidad_movil: String(item.tipo_unidad_movil || '').trim(),
                personal_empresa_entrega: String(item.personal_empresa_entrega || '').trim(),
                tipo_entrega: String(item.tipo_entrega || '').trim(),
                estado: String(getCol(item, 'Estado', 'estado') || 'PENDIENTE X CONFIRMAR').trim(),
                // Inventory cross-reference
                inv_estado: inv ? String(inv.estado || '') : '',
                cobertura: inv ? String(inv.cobertura || '') : '',
                inv_actual: inv ? Number(inv.inv_actual || 0) : 0,
                reserva: inv ? Number(inv.reserva || 0) : 0,
                demanda: inv ? Number(inv.demanda || 0) : 0,
                _srcRow: Array.isArray(item._srcRow) ? item._srcRow : []
            };
        }

        function normalizeCita(item, index) {
            return {
                id: String(item.id || item.numero_orden_compra || `CITA-${index + 1}`),
                fecha_confirmada: item.fecha_confirmada || item.fecha || '',
                hora_confirmada: String(item.hora_confirmada || '').trim(),
                estado_cita: String(item.estado_cita || 'CITA AGENDADA').trim(),
                nombre_proveedor: String(item.nombre_proveedor || '').trim(),
                numero_orden_compra: String(item.numero_orden_compra || '').trim(),
                descripcion_producto: String(item.descripcion_producto || '').trim(),
                codigo_referencia: String(item.codigo_referencia || '').trim()
            };
        }

        // ===== FILTERS =====

        function populateFilters() {
            const proveedores = [...new Set(
                state.solicitudes.map(s => s.nombre_proveedor).filter(Boolean)
            )].sort();
            const areas = [...new Set(
                state.solicitudes.map(s => s.area_correspondiente).filter(Boolean)
            )].sort();

            const selProv = document.getElementById('filterProveedor');
            const selArea = document.getElementById('filterArea');
            // Preserve current selection if possible
            const prevProv = selProv.value;
            const prevArea = selArea.value;

            selProv.innerHTML = '<option value="">Todos los proveedores</option>' +
                proveedores.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
            selArea.innerHTML = '<option value="">Todas las áreas</option>' +
                areas.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');

            if (prevProv) selProv.value = prevProv;
            if (prevArea) selArea.value = prevArea;
        }

        // ===== RENDER SIDEBAR =====

        function renderSidebar() {
            const container = document.getElementById('confSidebarList');
            // Show all pending items — cutoff date is only used for suggested-date calculation
            let solicitudes = [...state.solicitudes];

            // Apply filter bar
            const filterProv = document.getElementById('filterProveedor').value;
            const filterCod  = document.getElementById('filterCodigo').value.trim().toUpperCase();
            const filterArea = document.getElementById('filterArea').value;

                solicitudes = solicitudes.filter(s => s.nombre_proveedor === filterProv);
            }
            if (filterCod) {
                solicitudes = solicitudes.filter(s =>
                    s.codigo_referencia.toUpperCase().includes(filterCod) ||
                    s.codigo_normalizado.includes(filterCod)
                );
            }

            solicitudes = sortSolicitudes(solicitudes);

            container.innerHTML = solicitudes.map(item => {

                        <div class="card-section-form">

                                    <tr><td class="card-label">Código de referencia</td><td class="card-value">${escapeHtml(item.codigo_referencia || 'N/D')}</td></tr>
                                    <tr><td class="card-label">Descripción del producto</td><td class="card-value">${escapeHtml(item.descripcion_producto || 'N/D')}</td></tr>

                                    <tr><td class="card-label">Fecha entrega solicitada</td><td class="card-value">${escapeHtml(formatDisplayDateStr(item.fecha_solicitada))}</td></tr>
                                    ${item.hora_solicitada ? `<tr><td class="card-label">Hora solicitada</td><td class="card-value">${escapeHtml(item.hora_solicitada)}</td></tr>` : ''}
                                    <tr><td class="card-label">N° Orden de Compra</td><td class="card-value">${escapeHtml(item.numero_orden_compra || 'N/D')}</td></tr>
                                    <tr><td class="card-label">Área correspondiente</td><td class="card-value">${escapeHtml(item.area_correspondiente || 'N/D')}</td></tr>
                                    <tr class="card-suggested-row"><td class="card-label">📅 Fecha sugerida</td><td class="card-value">${escapeHtml(suggestedStr)}</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="card-section-header card-section-header-inv">Tablero de Abastecimiento</div>
                        <div class="card-section-inv">
                            <table class="card-table">
                                <tbody>
                            ${hasInv ? `
                                <tr><td class="card-label">Cobertura</td><td class="card-value">${escapeHtml(item.cobertura || 'N/D')}</td></tr>
                                <tr><td class="card-label">Estado</td><td class="card-value">${escapeHtml(item.inv_estado || priority.estado || 'N/D')}</td></tr>
                                <tr><td class="card-label">Inv. Act</td><td class="card-value">${escapeHtml(String(item.inv_actual || 0))}</td></tr>
                                <tr><td class="card-label">Reserva</td><td class="card-value">${escapeHtml(String(item.reserva || 0))}</td></tr>
                                <tr><td class="card-label">Demanda</td><td class="card-value">${escapeHtml(String(item.demanda || 0))}</td></tr>
                            ` : '<tr><td colspan="2" class="card-value" style="opacity:0.78;">Sin datos de inventario</td></tr>'}
                                </tbody>
                            </table>

                `;
            }).join('');

            container.querySelectorAll('.conf-pending-card').forEach(card => {
                card.addEventListener('dragstart', event => {
                    state.dragPayload = { type: 'pending', id: card.dataset.id };
                    event.dataTransfer.effectAllowed = 'move';
                    event.dataTransfer.setData('text/plain', JSON.stringify(state.dragPayload));
                });
                card.addEventListener('dragend', () => {
                    state.dragPayload = null;
                });
            });
        }

        // ===== RENDER CALENDAR (2-week view) =====

        function renderCalendar() {
            const grid      = document.getElementById('confCalGrid');
            const weekLabel = document.getElementById('confWeekLabel');

            const weekStart = state.currentWeekStart;
            const weekEnd   = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 13); // 2 weeks = 14 days (0–13)

            weekLabel.textContent = formatRangeLabel(weekStart, weekEnd);

            const weekdays = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
            let html = weekdays.map(d => `<div class="conf-weekday">${d}</div>`).join('');

            for (let i = 0; i < 14; i++) {
                const date    = new Date(weekStart);
                date.setDate(weekStart.getDate() + i);
                const isoDate = toISODate(date);
                const citas   = state.citas.filter(c => c.fecha_confirmada === isoDate);
                const dayNum  = date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });

                html += `
                    <div class="conf-day-cell" data-date="${isoDate}">
                        <div class="conf-day-number">${escapeHtml(dayNum)}</div>
                        <div class="conf-day-items">
                            ${citas.map(cita => {
                                const sc = getCitaStatusClass(cita.estado_cita);
                                return `
                                    <div class="conf-cita-card" draggable="true"
                                         data-confirmed-oc="${escapeHtml(cita.numero_orden_compra)}">
                                        <strong>${escapeHtml(cita.nombre_proveedor || 'Proveedor')}</strong>
                                        <div>${escapeHtml(cita.hora_confirmada || '--:--')}</div>
                                        <span class="status-badge status-${sc}">${escapeHtml(cita.estado_cita || 'CITA AGENDADA')}</span>
                                        <div class="conf-pending-meta">OC: ${escapeHtml(cita.numero_orden_compra || 'N/D')}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            grid.innerHTML = html;

            // ---- Drag & Drop (fixed) ----
            grid.querySelectorAll('.conf-day-cell').forEach(cell => {
                cell.addEventListener('dragover', event => {
                    event.preventDefault();
                    event.stopPropagation();
                    event.dataTransfer.dropEffect = 'move';
                    cell.classList.add('is-drag-over');
                });
                cell.addEventListener('dragleave', event => {
                    if (!cell.contains(event.relatedTarget)) {
                        cell.classList.remove('is-drag-over');
                    }
                });
                cell.addEventListener('drop', async event => {
                    event.preventDefault();
                    cell.classList.remove('is-drag-over');
                    const payload = getDragPayload(event);
                    state.dragPayload = null;
                    if (!payload || !cell.dataset.date) return;
                    if (payload.type === 'pending') {
                        openModal(payload.id, cell.dataset.date);
                    } else if (payload.type === 'confirmed' && payload.oc) {
                        await updateCita(payload.oc, cell.dataset.date).catch(handleAsyncError);
                    }
                });
            });

            grid.querySelectorAll('.conf-cita-card').forEach(card => {
                card.addEventListener('dragstart', event => {
                    state.dragPayload = { type: 'confirmed', oc: card.dataset.confirmedOc };
                    event.dataTransfer.effectAllowed = 'move';
                    event.dataTransfer.setData('text/plain', JSON.stringify(state.dragPayload));
                });
                card.addEventListener('dragend', () => {
                    state.dragPayload = null;
                });
            });
        }

        // ===== MODAL =====

        function getDragPayload(event) {
            try {
                return state.dragPayload || JSON.parse(event.dataTransfer.getData('text/plain'));
            } catch (_) {
                return state.dragPayload;
            }
        }

        function openModal(solicitudId, fecha) {
            state.activeSolicitudId = String(solicitudId);
            const solicitud = state.solicitudes.find(item => String(item.id) === String(solicitudId));
            document.getElementById('confModalFecha').value = fecha || '';
            document.getElementById('confModalHora').value  = solicitud ? solicitud.hora_solicitada || '' : '';
            document.getElementById('confModalEstado').value = 'CITA AGENDADA';
            document.getElementById('confModalObs').value    = '';
            document.getElementById('confModalTitle').textContent = solicitud
                ? `${solicitud.nombre_proveedor || 'Proveedor'} · OC ${solicitud.numero_orden_compra || 'N/D'}`
                : 'Selecciona fecha, hora y estado.';
            document.getElementById('confModalOverlay').classList.add('is-open');
        }

        function closeModal() {
            state.activeSolicitudId = null;
            document.getElementById('confModalOverlay').classList.remove('is-open');
        }

        async function confirmModal() {
            const solicitud = state.solicitudes.find(item => String(item.id) === String(state.activeSolicitudId));
            if (!solicitud) return;

            const fecha_confirmada = document.getElementById('confModalFecha').value;
            const hora_confirmada  = document.getElementById('confModalHora').value;
            const estado_cita      = document.getElementById('confModalEstado').value;
            const observaciones    = document.getElementById('confModalObs').value.trim();

            if (!fecha_confirmada) {
                window.alert('Debes seleccionar una fecha.');
                return;
            }

            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'confirmarCita',
                    data: {
                        fecha_confirmada,
                        hora_confirmada,
                        estado_cita,
                        observaciones,
                        src_row: solicitud._srcRow || [],
                        numero_orden_compra: solicitud.numero_orden_compra,
                        codigo_referencia: solicitud.codigo_referencia,
                        descripcion_producto: solicitud.descripcion_producto,
                        cantidad_unidades: solicitud.cantidad_unidades,
                        cantidad_bultos: solicitud.cantidad_bultos,
                        cantidad_pallets: solicitud.cantidad_pallets,
                        tipo_ambiente: solicitud.tipo_ambiente,
                        area_correspondiente: solicitud.area_correspondiente,
                        nombre_solicitante: solicitud.nombre_solicitante,
                        correo_solicitante: solicitud.correo_solicitante,
                        telefono: solicitud.telefono,
                        tipo_unidad_movil: solicitud.tipo_unidad_movil,
                        personal_empresa_entrega: solicitud.personal_empresa_entrega,
                        tipo_entrega: solicitud.tipo_entrega
                    }
                })
            });

            const result = await response.json();
            if (!result.success) {
                throw new Error(result.error || 'No se pudo confirmar la cita');
            }

            closeModal();
            await loadData();
        }

        async function updateCita(numeroOrdenCompra, nuevaFecha) {
            const cita = state.citas.find(item => item.numero_orden_compra === numeroOrdenCompra);
            if (!cita) return;

            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'actualizarCita',
                    data: {
                        numero_orden_compra: numeroOrdenCompra,
                        fecha_confirmada: nuevaFecha,
                        estado_cita: cita.estado_cita || 'CITA AGENDADA',
                        hora_confirmada: cita.hora_confirmada || ''
                    }
                })
            });

            const result = await response.json();
            if (!result.success) {
                throw new Error(result.error || 'No se pudo actualizar la cita');
            }

            await loadData();
        }

        function handleAsyncError(error) {
            console.error(String(error));
        }

        // ===== DATA LOADING =====

        function normalizeCoverageMap(payload) {
            const source = payload && payload.data !== undefined ? payload.data : payload;
            const map = {};

            function assignRow(row, fallbackCode) {
                if (!row || typeof row !== 'object') return;
                const code = normalizeCode(
                    row.codigo_producto ??
                    row.codigo ??
                    row.codigo_referencia ??
                    row.cod ??
                    row.Codigo ??
                    row.Código ??
                    fallbackCode
                );
                if (!code) return;
                map[code] = {
                    cobertura: row.cobertura ?? row.Cobertura ?? row.coverage ?? '',
                    estado: String(row.estado ?? row.Estado ?? row.status ?? '').toUpperCase().trim(),
                    inv_actual: Number(row.inv_actual ?? row.Inv_Actual ?? row.invActual ?? 0),
                    reserva: Number(row.reserva ?? row.Reserva ?? 0),
                    demanda: Number(row.demanda ?? row.Demanda ?? 0)
                };
            }

            if (Array.isArray(source)) {
                source.forEach(row => assignRow(row));
                return map;
            }

            if (source && typeof source === 'object') {
                Object.entries(source).forEach(([key, value]) => {
                    if (value && typeof value === 'object') {
                        assignRow(value, key);
                    }
                });
            }
            return map;
        }

        async function loadAbastecimiento() {
            const hasConfiguredCoverageUrl =
                COVERAGE_SCRIPT_URL &&
                !COVERAGE_SCRIPT_URL.includes('[URL_DEL_SCRIPT_DE_CURVAS]');

            if (!hasConfiguredCoverageUrl) {
                console.warn('Coverage script URL no configurada. Se mostrarán tarjetas sin inventario.');
                return {};
            }

            const coverageResponse = await loadJsonp(
                `${COVERAGE_SCRIPT_URL}?report=coverage&callback=cbCoverage`,
                'cbCoverage'
            ).catch(err => {
                console.warn('No se pudo cargar cobertura:', err.message);
                return { success: false, data: {} };
            });

            if (coverageResponse && coverageResponse.success === false) {
                return {};
            }
            return normalizeCoverageMap(coverageResponse);
        }

        async function loadData() {
            state.abastecimiento = {};

            const solicitudesData = await loadJsonp(
                `${APPS_SCRIPT_URL}?action=getSolicitudesPendientes&callback=handleSolicitudesData`,
                'handleSolicitudesData'
            ).catch(err => {
                console.warn('No se pudieron cargar solicitudes:', err.message);
                return { success: false, data: [] };
            });

            const citasData = await loadJsonp(
                `${APPS_SCRIPT_URL}?action=getCitasData&callback=handleCitasData`,
                'handleCitasData'
            ).catch(err => {
                console.warn('No se pudieron cargar citas:', err.message);
                return { success: false, data: [] };
            });

            state.abastecimiento = await loadAbastecimiento();

            if (!solicitudesData.success) {
                console.warn('Error solicitudes:', solicitudesData.error);
            }
            if (!citasData.success) {
                console.warn('Error citas:', citasData.error);
            }

            // normalizeSolicitud uses state.abastecimiento, so set it first
            state.citas = (citasData.data || []).map(normalizeCita);
            const confirmedOcs = new Set(state.citas.map(c => c.numero_orden_compra).filter(Boolean));
            state.solicitudes = (solicitudesData.data || [])
                .map(normalizeSolicitud)
                .filter(item => item.numero_orden_compra && !confirmedOcs.has(item.numero_orden_compra));

            populateFilters();
            renderSidebar();
            renderCalendar();
        }

        // ===== INITIALIZATION =====

        document.getElementById('confThemeMode').addEventListener('change', applyTheme);
        document.getElementById('confRefreshBtn').addEventListener('click', () => loadData().catch(handleAsyncError));

        document.getElementById('confPrevWeek').addEventListener('click', () => {
            state.currentWeekStart.setDate(state.currentWeekStart.getDate() - 7);
            renderCalendar();
        });
        document.getElementById('confNextWeek').addEventListener('click', () => {
            state.currentWeekStart.setDate(state.currentWeekStart.getDate() + 7);
            renderCalendar();
        });

        document.getElementById('filterProveedor').addEventListener('change', renderSidebar);
        document.getElementById('filterCodigo').addEventListener('input', renderSidebar);
        document.getElementById('filterArea').addEventListener('change', renderSidebar);

        document.getElementById('confModalCancelar').addEventListener('click', closeModal);
        document.getElementById('confModalConfirmar').addEventListener('click', () => confirmModal().catch(handleAsyncError));
        document.getElementById('confModalOverlay').addEventListener('click', closeModal);

        const savedThemeMode = localStorage.getItem('confThemeMode') || 'auto';
        document.getElementById('confThemeMode').value = savedThemeMode;
        applyTheme();
        updateDateTime();
        setInterval(updateDateTime, 60000);

        state.currentWeekStart = getMondayOfCurrentWeek();
        loadData().catch(handleAsyncError);
    </script>
</body>
</html>
