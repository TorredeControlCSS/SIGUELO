<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comprobante de Cita — CSS</title>
<style>
  :root{ --azul:#1e5a9e; --azul-osc:#0C447C; --fondo:#ececec; --borde:#a8a8a8; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--fondo); font-family:Arial,Helvetica,sans-serif; color:#222; padding:16px; }
  .card{ max-width:460px; margin:18px auto; background:#fff; border:1px solid var(--borde); box-shadow:0 4px 18px rgba(0,0,0,.12); }
  .head{ background:var(--azul); color:#fff; padding:16px 18px; display:flex; align-items:center; gap:12px; }
  .head img{ width:46px; height:46px; object-fit:contain; background:#fff; border-radius:4px; padding:2px; }
  .head h1{ font-size:15px; margin:0; line-height:1.3; }
  .head .org{ font-size:11.5px; opacity:.92; margin-top:2px; }
  .aviso{ background:#ffe600; color:#7a0000; font-weight:bold; font-size:12.5px; text-align:center; padding:9px 12px; border-bottom:1px solid #e6cf00; }
  .body{ padding:18px; }
  .ok{ color:#0a7a2f; font-size:14px; font-weight:600; text-align:center; margin-bottom:6px; }
  .sub{ font-size:12px; color:#666; text-align:center; margin-bottom:16px; }
  .cod-box{ text-align:center; background:#f4f7fb; border:1px solid #d6e2f0; border-radius:4px; padding:12px; margin-bottom:16px; }
  .cod-box .lbl{ font-size:11.5px; color:#555; }
  .cod-box .val{ font-family:Consolas,'Courier New',monospace; font-size:19px; font-weight:bold; color:var(--azul); letter-spacing:.5px; }
  .estado{ display:inline-block; font-size:11.5px; font-weight:bold; padding:3px 10px; border-radius:12px; margin-top:6px; }
  .est-pend{ background:#fff3d6; color:#8a5200; border:1px solid #e6c870; }
  .est-conf{ background:#e3f5e8; color:#0a7a2f; border:1px solid #9bd6ad; }
  .est-repro{ background:#ece9f7; color:#5a4ba8; border:1px solid #c7bfe8; }
  .est-dif{ background:#fde2e2; color:#b00020; border:1px solid #e8a8a8; }
  .instruccion{ font-size:13px; font-weight:600; text-align:center; padding:10px 12px; border-radius:4px; margin-bottom:16px; }
  .ins-conf{ background:#e3f5e8; color:#0a7a2f; border:1px solid #9bd6ad; }
  .ins-pend{ background:#fff8ee; color:#8a5200; border:1px solid #e6c870; }
  .ins-repro{ background:#f2f0fb; color:#5a4ba8; border:1px solid #c7bfe8; }
  .ins-dif{ background:#fdeeee; color:#9a0018; border:1px solid #e8a8a8; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  td{ padding:8px 6px; border-bottom:1px solid #eee; vertical-align:top; }
  td.k{ color:#666; width:38%; }
  td.v{ font-weight:600; }
  .pie{ font-size:11px; color:#777; text-align:center; padding:14px 18px; border-top:1px solid #eee; line-height:1.7; }
  .mono{ font-family:Consolas,'Courier New',monospace; }
  .vacio{ text-align:center; color:#999; padding:30px 16px; font-size:13px; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="vacio">Cargando comprobante…</div>
</div>

<script>
function par(n){
  try{ return new URLSearchParams(location.search).get(n) || ''; }catch(e){ return ''; }
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function num(v){
  var n=Number(v); if(!v||isNaN(n)) return '';
  return n.toLocaleString('es-PA');
}

(function(){
  var cod = par('cod');
  var oc = par('oc');
  var prod = par('prod');
  var abasto = par('abasto');
  var fecha = par('fecha');
  var emp = par('emp');
  var und = par('und');
  var pallets = par('pallets');
  var est = (par('est')||'PENDIENTE').toUpperCase();
  var fconf = par('fconf');   // fecha confirmada (para CONFIRMADA)
  var hconf = par('hconf');   // hora confirmada
  var motivo = par('motivo'); // motivo (para REPROGRAMADA / DIFERIDA)
  var nota = par('nota');     // nº de nota (para DIFERIDA)
  var logo = 'https://torredecontrolcss.github.io/SIGUELO/icons/icon-192.png';

  var card = document.getElementById('card');
  if(!cod && !oc){
    card.innerHTML='<div class="vacio">Este comprobante no tiene datos. Verifique el enlace o el código QR.</div>';
    return;
  }

  // Configuración visual por estado
  var cfg;
  if(est==='CONFIRMADA' || est==='AGENDADA'){
    cfg={ titulo:'Comprobante de Cita Confirmada', aviso:null,
      badge:'CITA CONFIRMADA', badgeCls:'est-conf',
      okTxt:'✔ Su cita ha sido confirmada',
      ins:'PRESÉNTESE EN LA FECHA Y HORA INDICADAS', insCls:'ins-conf',
      sub:'Su cita está programada. Por favor preséntese puntualmente en CEDIS Panamá.' };
  } else if(est==='REPROGRAMADA'){
    cfg={ titulo:'Comprobante — Cita Reprogramada', aviso:null,
      badge:'CITA REPROGRAMADA', badgeCls:'est-repro',
      okTxt:'Su cita será reprogramada',
      ins:'NO SE PRESENTE AÚN — se le informará la nueva fecha', insCls:'ins-repro',
      sub:'Su solicitud se tomará en cuenta para el próximo período. Espere la nueva confirmación.' };
  } else if(est==='DIFERIDA'){
    cfg={ titulo:'Comprobante — Cita Diferida', aviso:null,
      badge:'CITA DIFERIDA', badgeCls:'est-dif',
      okTxt:'Su cita ha sido diferida',
      ins:'NO SE PRESENTE AÚN — entrega diferida con nota formal', insCls:'ins-dif',
      sub:'Su entrega fue diferida por la institución. Esta gestión lo respalda ante el vencimiento de la orden.' };
  } else {
    cfg={ titulo:'Comprobante de Solicitud de Cita', aviso:'⚠ ESTE COMPROBANTE NO ES UNA CONFIRMACIÓN DE CITA',
      badge:'PENDIENTE DE CONFIRMACIÓN', badgeCls:'est-pend',
      okTxt:'✔ Su solicitud fue registrada',
      ins:'EN ESPERA DE CONFIRMACIÓN — no se presente aún', insCls:'ins-pend',
      sub:'Su cita será evaluada el jueves y confirmada el viernes al correo indicado.' };
  }

  var filas='';
  function fila(k,v){ if(v) filas+='<tr><td class="k">'+k+'</td><td class="v">'+esc(v)+'</td></tr>'; }
  if(emp) fila('Empresa', emp);
  fila('Orden de Compra', oc);
  fila('Producto', prod);
  if(abasto) filas+='<tr><td class="k">Código Abasto</td><td class="v mono">'+esc(abasto)+'</td></tr>';
  fila('Fecha solicitada', fecha);
  if((est==='CONFIRMADA'||est==='AGENDADA') && fconf) fila('Fecha confirmada', fconf + (hconf?(' · '+hconf):''));
  if((est==='REPROGRAMADA'||est==='DIFERIDA') && motivo) fila('Motivo', motivo);
  if(est==='DIFERIDA' && nota) fila('Nota de diferimiento', nota);
  var cant=[]; if(num(und)) cant.push(num(und)+' und'); if(num(pallets)) cant.push(num(pallets)+' pallets');
  if(cant.length) fila('Cantidades', cant.join(' · '));

  card.innerHTML=
    '<div class="head">'+
      '<img src="'+logo+'" alt="CSS">'+
      '<div><h1>'+cfg.titulo+'</h1>'+
        '<div class="org">Caja de Seguro Social · Dirección Nacional de Logística</div></div>'+
    '</div>'+
    (cfg.aviso?'<div class="aviso">'+cfg.aviso+'</div>':'')+
    '<div class="body">'+
      '<div class="ok">'+cfg.okTxt+'</div>'+
      '<div class="sub">'+cfg.sub+'</div>'+
      '<div class="instruccion '+cfg.insCls+'">'+cfg.ins+'</div>'+
      '<div class="cod-box">'+
        '<div class="lbl">Código de confirmación</div>'+
        '<div class="val">'+esc(cod||'—')+'</div>'+
        '<div class="estado '+cfg.badgeCls+'">'+cfg.badge+'</div>'+
      '</div>'+
      '<table>'+filas+'</table>'+
    '</div>'+
    '<div class="pie">'+
      'Conserve este comprobante.<br>'+
      'Dirección Nacional de Logística · Tel. +507 513-7000 Ext. 86322'+
    '</div>';
})();
</script>
</body>
</html>
