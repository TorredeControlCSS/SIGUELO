<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C447C">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>SÍGUELO · Agenda de citas — CEDIS Panamá</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root{
    --azul:#1e5a9e; --azul-osc:#0C447C; --fondo:#ececec; --borde:#a8a8a8;
    --rojo:#A32D2D; --verde:#0F6E56; --ambar:#854F0B;
    --mono:'Consolas','Courier New',monospace; --card:#fff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--fondo);color:#222;font-size:15px;padding-bottom:70px;line-height:1.5;}

  /* Header institucional — logo limpio sin recuadro, como el panel */
  .header{background:var(--azul-osc);color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 16px 14px;display:flex;align-items:center;gap:13px;position:sticky;top:0;z-index:30;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .header .logo{width:46px;height:46px;flex-shrink:0;object-fit:contain;}
  .header h1{font-size:17px;margin:0;font-weight:700;line-height:1.2;}
  .header .sub{font-size:11.5px;opacity:.85;margin-top:2px;}
  .header .upd{margin-left:auto;font-size:10px;opacity:.8;text-align:right;line-height:1.35;white-space:nowrap;}

  .wrap{max-width:1200px;margin:0 auto;padding:12px;}

  /* ===== Filtros Día / Rango ===== */
  .filtros{background:var(--card);border:1px solid var(--borde);border-radius:8px;padding:12px;margin-bottom:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
  .fg{display:flex;flex-direction:column;min-width:0;}
  .fg label{font-size:10.5px;font-weight:700;color:var(--azul-osc);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fg select,.fg input{padding:8px 9px;border:1px solid var(--borde);border-radius:6px;font-size:13px;font-family:inherit;background:#fff;color:#222;height:36px;width:100%;}
  .fg select:focus,.fg input:focus{outline:none;border-color:var(--azul);}

  /* ===== Métricas (8 — algunas actúan como filtro de área) ===== */
  .metrics{display:grid;grid-template-columns:repeat(8,1fr);gap:7px;margin-bottom:14px;}
  .metric{background:var(--card);border:1px solid var(--borde);border-radius:7px;padding:8px 7px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center;min-height:64px;transition:border-color .12s,box-shadow .12s;}
  .metric.clickable{cursor:pointer;}
  .metric.clickable:hover{border-color:var(--azul);box-shadow:0 2px 6px rgba(30,90,158,.18);}
  .metric.activa{border:2px solid var(--azul);box-shadow:0 2px 8px rgba(30,90,158,.28);padding:7px 6px;}
  .metric .ic{width:18px;height:18px;line-height:0;color:var(--azul-osc);opacity:.85;}
  .metric .ic svg{width:18px;height:18px;display:block;}
  .metric .v{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--azul-osc);line-height:1.05;white-space:nowrap;}
  .metric .v .sep{color:#aab4c0;font-weight:400;}
  .metric .l{font-size:8.5px;color:#777;text-transform:uppercase;letter-spacing:.2px;line-height:1.1;}
  /* tonos suaves por grupo, estética enterprise */
  .metric:nth-child(1){background:#eef4fb;} .metric:nth-child(2){background:#eef4fb;}
  .metric:nth-child(3){background:#e7f3fb;}
  .metric:nth-child(4){background:#f0f6ea;} .metric:nth-child(5){background:#eef0fb;}
  .metric:nth-child(6){background:#fbf7e8;} .metric:nth-child(7){background:#f5eefb;}
  .metric:nth-child(8){background:#fbeeee;}
  .metric.activa{filter:brightness(1.02);}

  /* ===== Gráfico ===== */
  .chart-card{background:var(--card);border:1px solid var(--borde);border-radius:8px;padding:13px 14px 8px;margin-bottom:14px;}
  .chart-card h2{font-size:13px;color:var(--azul-osc);margin:0 0 8px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .chart-card h2 .h2ic{display:inline-flex;width:16px;height:16px;color:var(--azul-osc);}
  .chart-card h2 .h2ic svg{width:16px;height:16px;}
  .chart-box{position:relative;height:200px;}

  /* ===== Búsqueda global ===== */

  .buscar{width:100%;padding:11px 13px;border:1px solid var(--borde);border-radius:7px;font-size:15px;font-family:inherit;background:#fff;margin-bottom:14px;}

  /* ===== Layout dos columnas (Período | Próximos Días) ===== */
  .main{display:grid;grid-template-columns:2fr 1fr;gap:16px;}
  .panel{background:transparent;}
  .panel-titulo{font-size:14px;font-weight:700;color:var(--azul-osc);border-bottom:2px solid var(--azul);padding-bottom:7px;margin:0 0 12px;}

  /* ===== Grupos por día ===== */
  .grupo{margin-bottom:14px;}
  .grupo-cab{display:flex;align-items:center;gap:8px;background:var(--azul-osc);color:#fff;padding:9px 13px;border-radius:7px 7px 0 0;font-weight:700;font-size:13.5px;}
  .grupo-cab .cuenta{margin-left:auto;font-family:var(--mono);font-size:12px;background:rgba(255,255,255,.18);padding:2px 9px;border-radius:10px;white-space:nowrap;}

  /* ===== Tarjeta densa (2 filas de detalle) ===== */
  .cita{background:var(--card);border:1px solid var(--borde);border-top:none;padding:11px 13px;}
  .cita:last-child{border-radius:0 0 7px 7px;}
  .cita + .cita{border-top:1px solid #e8e8e8;}
  .cita-top{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .cita-hora{font-family:var(--mono);font-weight:700;color:var(--azul-osc);font-size:15px;min-width:46px;}
  .cita-fecha{font-size:11px;color:#555;background:#f1f4f7;border:1px solid #dfe6ed;border-radius:4px;padding:2px 7px;font-family:var(--mono);}
  .cita-estado{font-size:10px;font-weight:700;padding:3px 8px;border-radius:11px;letter-spacing:.3px;}
  .cita-emp{font-weight:700;font-size:14px;margin-left:auto;text-align:right;flex:1;min-width:120px;}

  /* estados */
  .est-AGENDADA{background:#d1ecf1;color:#0c5460;border:1px solid #bee5eb;}
  .est-ASISTIO{background:#d4edda;color:#155724;border:1px solid #c3e6cb;}
  .est-NO_ASISTIO{background:#e2e3e5;color:#383d41;border:1px solid #d6d8db;}
  .est-DIFERIDA{background:#fff3cd;color:#856404;border:1px solid #ffeaa7;}
  .est-REPROGRAMADA{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;}
  .est-default{background:#eef2f6;color:#3a4a5a;border:1px solid #c8d2dc;}

  /* filas de detalle tipo grid */
  .det{display:grid;gap:6px 8px;font-size:12px;}
  .det-1{grid-template-columns:3fr 1fr 1fr 1fr 1fr 1fr;}
  .det-2{grid-template-columns:2fr 1.4fr 1.6fr 1.2fr 1.4fr 1.4fr;background:#f7f9fb;border:1px solid #e8eef4;border-radius:5px;padding:8px;margin-top:6px;}
  .di{display:flex;flex-direction:column;min-width:0;}
  .di .lab{font-size:8.5px;font-weight:700;color:#8a97a3;text-transform:uppercase;letter-spacing:.2px;margin-bottom:2px;}
  .di .val{font-size:11.5px;color:#222;line-height:1.25;}
  .di .val.mono{font-family:var(--mono);}
  .trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* badges */
  .badges-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:.3px;}
  .pill-cat{background:#eef2f6;color:#3a4a5a;border:1px solid #c8d2dc;}
  .pill-frio{background:#e3f2fb;color:#0b5a8a;border:1px solid #b8ddf0;}
  .pill-ctrl{background:#fdecec;color:#922;border:1px solid #f3c4c4;}
  .pill-seg{background:#fff3cd;color:#7a5c00;border:1px solid #f0e0a8;}

  /* panel próximos días */
  .prox-item{border-left:4px solid var(--azul);background:#f7f9fb;padding:11px 13px;margin-bottom:10px;border-radius:0 7px 7px 0;}
  .prox-fecha{font-weight:700;color:var(--azul-osc);font-size:13px;margin-bottom:2px;}
  .prox-cant{color:#667;font-size:11.5px;font-family:var(--mono);margin-bottom:6px;}
  .prox-cita{margin-top:7px;padding-left:9px;border-left:2px solid #dde4ec;}
  .prox-cita .e{font-weight:700;font-size:12.5px;}
  .prox-cita .m{font-size:11px;color:#667;}

  .vacio{text-align:center;color:#888;padding:40px 20px;font-size:14px;}
  .cargando{text-align:center;color:var(--azul);padding:40px 20px;font-size:14px;}
  .spin{display:inline-block;width:22px;height:22px;border:3px solid #cfe0f0;border-top-color:var(--azul);border-radius:50%;animation:g .8s linear infinite;vertical-align:middle;margin-right:8px;}
  @keyframes g{to{transform:rotate(360deg);}}

  .barra-inf{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--borde);display:flex;padding:8px 12px calc(env(safe-area-inset-bottom) + 8px);gap:10px;z-index:25;}
  .barra-inf button{flex:1;padding:11px;border:1px solid var(--azul);background:#fff;color:var(--azul);font-weight:600;border-radius:7px;font-size:14px;font-family:inherit;cursor:pointer;}
  .barra-inf button.prim{background:var(--azul);color:#fff;}

  /* ===== Responsive ===== */
  @media (max-width:1100px){ .metrics{grid-template-columns:repeat(4,1fr);} }
  @media (max-width:900px){
    .main{grid-template-columns:1fr;}
    .metrics{grid-template-columns:repeat(4,1fr);}
  }
  @media (max-width:680px){
    .det-1{grid-template-columns:1fr 1fr 1fr !important;}
    .det-2{grid-template-columns:1fr 1fr !important;}
  }
  @media (max-width:560px){
    .metrics{grid-template-columns:repeat(2,1fr);}
    .metric .v{font-size:14px;}
  }
  @media (max-width:380px){
    .det-1,.det-2{grid-template-columns:1fr 1fr !important;}
  }
</style>
</head>
<body>

<div class="header">
  <img class="logo" src="./icons/icon-192.png" alt="Logo CSS Panamá" onerror="this.style.display='none'">
  <div>
    <h1>Agenda de citas — CEDIS Panamá</h1>
    <div class="sub">Torre de Control · Dirección Nacional de Logística</div>
  </div>
  <div class="upd" id="updInfo">—</div>
</div>

<div class="wrap">

  <!-- Filtros Día / Rango -->
  <div class="filtros">
    <div class="fg">
      <label for="modo">Modo de visualización</label>
      <select id="modo">
        <option value="dia">Día individual</option>
        <option value="rango">Rango de fechas</option>
      </select>
    </div>
    <div class="fg" id="fgDia">
      <label for="fechaDia">Fecha a visualizar</label>
      <input type="date" id="fechaDia">
    </div>
    <div class="fg" id="fgIni" style="display:none;">
      <label for="fechaIni">Fecha inicio</label>
      <input type="date" id="fechaIni">
    </div>
    <div class="fg" id="fgFin" style="display:none;">
      <label for="fechaFin">Fecha fin</label>
      <input type="date" id="fechaFin">
    </div>
  </div>

  <!-- Búsqueda global -->
  <input type="text" class="buscar" id="buscar" placeholder="Buscar empresa, OC, renglón o producto…" autocomplete="off">

  <!-- Métricas (8 — las de área actúan como filtro) -->
  <div class="metrics" id="metrics"></div>

  <!-- Gráfico semanal -->
  <div class="chart-card">
    <h2><span class="h2ic" id="icChart"></span> Carga semanal: citas y pallets por día <span id="chartPeriodo" style="font-weight:400;font-size:11px;color:#667;margin-left:auto;"></span></h2>
    <div class="chart-box"><canvas id="cargaChart"></canvas></div>
  </div>

  <!-- Dos columnas -->
  <div class="main">
    <div class="panel">
      <h3 class="panel-titulo" id="tituloPeriodo">Citas del día</h3>
      <div id="contenido"><div class="cargando"><span class="spin"></span>Cargando agenda…</div></div>
    </div>
    <div class="panel" id="panelProx">
      <h3 class="panel-titulo">Próximos días</h3>
      <div id="proximos"><div class="vacio">—</div></div>
    </div>
  </div>

</div>

<div class="barra-inf">
  <button id="btnInstalar" style="display:none;">Instalar app</button>
  <button id="btnLimpiar">Limpiar filtros</button>
  <button class="prim" id="btnRefrescar">Actualizar</button>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbwVw0ACNMhdN6d-JsI1lyP2iKHBVgWXI5nK3rA6blEhF3l8t2Wuwk2TpRmaanB186Dk/exec';
let CITAS=[], AREA_SEL='', CARGADO=false, chart=null;

/* ===== Utilidades ===== */
function loadJsonp(action, extra){
  return new Promise((resolve,reject)=>{
    const cb='_cb_'+Date.now()+Math.floor(Math.random()*1000);
    window[cb]=(r)=>{ delete window[cb]; const s=document.getElementById(cb); if(s)s.remove(); resolve(r); };
    const s=document.createElement('script'); s.id=cb;
    s.src=API_URL+'?action='+action+'&callback='+cb+(extra||'');
    s.onerror=()=>{ delete window[cb]; reject(new Error('Error de red')); };
    document.body.appendChild(s);
    setTimeout(()=>{ if(window[cb]){ delete window[cb]; const x=document.getElementById(cb); if(x)x.remove(); reject(new Error('Tiempo agotado')); } },25000);
  });
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function num(n){ return Math.round(Number(n||0)).toLocaleString('es-PA'); }
function catNombre(c){ return String(c||'').toUpperCase().replace(/Á/g,'A').replace(/É/g,'E').replace(/Í/g,'I').replace(/Ó/g,'O').replace(/Ú/g,'U').replace(/Ì/g,'I').replace(/MEDICAMENTOS/,'MEDICAMENTO').replace(/LABORATORIOS/,'LABORATORIO').trim()||'SIN CATEGORÍA'; }
function catCorta(c){ const x=catNombre(c); const m={'MEDICAMENTO':'MEDICAMENTO','MEDICO QUIRURGICO':'MQ','LABORATORIO':'LAB','ODONTOLOGIA':'ODONTO','SUSTANCIAS CONTROLADAS':'S.CONTROL.','RADIOLOGIA':'RADIO','CLINICA DE HERIDAS':'HERIDAS'}; return m[x]||x; }
function infoSeg(s){ const m=String(s&&s.motivo||''); let mm=m.match(/Recepci[oó]n parcial:\s*([\d.,]+)\s+de\s+([\d.,]+)/i); if(mm) return 'Parcial: '+num(mm[1])+' de '+num(mm[2]); if(/Remanente diferido/i.test(m)) return 'Remanente'; return ''; }
function esFrio(s){
  if(s.es_frio) return true;
  const t=String(s.tipo_ambiente||'').toLowerCase();
  if(!t) return false;
  return t.includes('2-8')||t.includes('<8')||t.includes('frío')||t.includes('frio')||t.includes('refrigerad')||t.includes('congelad');
}

const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function fechaLegible(iso){
  if(!iso||iso.length<10) return 'Sin fecha';
  const [y,m,d]=iso.slice(0,10).split('-').map(Number);
  const dt=new Date(y,m-1,d), hoy=new Date(); hoy.setHours(0,0,0,0);
  const man=new Date(hoy); man.setDate(man.getDate()+1);
  let pre=''; const i=iso.slice(0,10);
  if(i===isoLocal(hoy)) pre='HOY · ';
  else if(i===isoLocal(man)) pre='MAÑANA · ';
  return pre+DIAS[dt.getDay()]+' '+d+' '+MES[m-1];
}
function fechaCorta(iso){
  if(!iso||iso.length<10) return '—';
  const [y,m,d]=iso.slice(0,10).split('-').map(Number);
  return String(d).padStart(2,'0')+'/'+String(m).padStart(2,'0')+'/'+y;
}
function isoLocal(dt){ const x=new Date(dt); x.setMinutes(x.getMinutes()-x.getTimezoneOffset()); return x.toISOString().slice(0,10); }
function hhmm(h){ const t=String(h||''); return t?t.slice(0,5):'--:--'; }

/* ===== Carga de datos ===== */
async function cargar(){
  const cont=document.getElementById('contenido');
  cont.innerHTML='<div class="cargando"><span class="spin"></span>Cargando agenda…</div>';
  try{
    const resp=await loadJsonp('getSolicitudesPriorizadas','');
    const todas=(resp&&resp.solicitudes)?resp.solicitudes:[];
    CITAS=todas.filter(s=>String(s.estado||'').toUpperCase()==='AGENDADA');
    CARGADO=true;
    document.getElementById('updInfo').innerHTML='Actualizado<br>'+new Date().toLocaleTimeString('es-PA',{hour:'2-digit',minute:'2-digit'});
    refrescarTodo();
  }catch(e){
    cont.innerHTML='<div class="vacio">No se pudo cargar la agenda.<br>Revisa tu conexión y toca <b>Actualizar</b>.<br><br><small>'+esc(e.message)+'</small></div>';
  }
}

/* ===== Íconos SVG monocromáticos (sin dependencias, firewall-safe) ===== */
const ICN={
  citas:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  unidades:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7L12 12l8.7-5M12 22V12"/></svg>',
  frio:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M4.9 4.9l14.2 14.2M19.1 4.9L4.9 19.1M2 12h20"/></svg>',
  med:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 20.5a4.95 4.95 0 0 1-7-7l7-7a4.95 4.95 0 0 1 7 7z"/><path d="M8.5 8.5l7 7"/></svg>',
  mq:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4L8.5 15.5"/><path d="M4 20l4.5-4.5 2.5 2.5"/><path d="M20 4c-1.5 3-4 5.5-7 7l2.5 2.5c2.5-1.5 5-4 4.5-9.5z"/></svg>',
  lab:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2v6.5L4.6 17a2 2 0 0 0 1.8 3h11.2a2 2 0 0 0 1.8-3L15 8.5V2"/><path d="M8 2h8M7.5 14h9"/></svg>',
  odo:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5.5C10.5 4 8 3.7 6.5 4.8 5 5.9 4.6 8 5.2 11c.4 2 .7 4.5 1.3 6.5.3 1 .7 2.5 1.5 2.5.9 0 1.2-1.5 1.5-3 .2-1.2.5-2 1-2s.8.8 1 2c.3 1.5.6 3 1.5 3 .8 0 1.2-1.5 1.5-2.5.6-2 .9-4.5 1.3-6.5.6-3 .2-5.1-1.3-6.2C16 3.7 13.5 4 12 5.5z"/></svg>',
  sus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 3h-9L3 7.5v9L7.5 21h9l4.5-4.5v-9z"/><path d="M12 8v5"/><path d="M12 16.5v.01"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="13" y="7" width="3" height="10"/></svg>'
};

/* ===== Conjuntos filtrados ===== */
function aplicaFiltrosComunes(s){
  if(AREA_SEL && catNombre(s.categoria)!==AREA_SEL) return false;
  const q=(document.getElementById('buscar').value||'').toLowerCase().trim();
  if(q){ const b=((s.empresa||'')+' '+(s.oc||'')+' '+(s.cod_abasto||'')+' '+(s.descripcion||'')).toLowerCase(); if(b.indexOf(q)<0) return false; }
  return true;
}
/* ===== Modo Día / Rango ===== */
function cambiarModo(){
  const esRango=document.getElementById('modo').value==='rango';
  document.getElementById('fgDia').style.display=esRango?'none':'flex';
  document.getElementById('fgIni').style.display=esRango?'flex':'none';
  document.getElementById('fgFin').style.display=esRango?'flex':'none';
  document.getElementById('panelProx').style.display=esRango?'none':'block';
  document.getElementById('tituloPeriodo').textContent=esRango?'Citas del período seleccionado':'Citas del día';
  if(CARGADO) refrescarTodo();
}

function citasPeriodo(){
  const modo=document.getElementById('modo').value;
  if(modo==='dia'){
    const f=document.getElementById('fechaDia').value;
    return CITAS.filter(s=>aplicaFiltrosComunes(s) && (s.fecha_confirmada||'').slice(0,10)===f);
  } else {
    const i=document.getElementById('fechaIni').value, fn=document.getElementById('fechaFin').value;
    return CITAS.filter(s=>{ const f=(s.fecha_confirmada||'').slice(0,10); return aplicaFiltrosComunes(s) && f>=i && f<=fn; });
  }
}
function citasProximas(){
  const f=document.getElementById('fechaDia').value;
  return CITAS.filter(s=>aplicaFiltrosComunes(s) && (s.fecha_confirmada||'').slice(0,10)>f);
}

/* ===== Métricas (8 — las de área actúan como filtro) ===== */
function renderMetricas(lista){
  const totalCitas=lista.length;
  const totalPallets=lista.reduce((t,s)=>t+Number(s.cant_pallets||0),0);
  const totalUnidades=lista.reduce((t,s)=>t+Number(s.cant_unidades||0),0);
  const frioL=lista.filter(esFrio);
  const palletsFrio=frioL.reduce((t,s)=>t+Number(s.cant_pallets||0),0);

  // Base para tarjetas-de-área: mismo período y búsqueda, SIN aplicar el filtro de área,
  // para que los conteos por área se mantengan visibles y permitan alternar.
  const base=citasBaseArea();
  const porArea=(area)=>{
    const a=base.filter(s=>catNombre(s.categoria)===area);
    return { c:a.length, p:a.reduce((t,s)=>t+Number(s.cant_pallets||0),0) };
  };
  const med=porArea('MEDICAMENTO');
  const mq =porArea('MEDICO QUIRURGICO');
  const lab=porArea('LABORATORIO');
  const odo=porArea('ODONTOLOGIA');
  const sus=porArea('SUSTANCIAS CONTROLADAS');

  const dual=(a,b)=> '<span class="v">'+num(a)+'<span class="sep"> | </span>'+num(b)+'</span>';
  const solo=(a)=> '<span class="v">'+num(a)+'</span>';

  // [icono, valorHTML, label, areaFiltro|null]
  const cards=[
    [ICN.citas,    dual(totalCitas,totalPallets), 'Citas | Pallets', null],
    [ICN.unidades, solo(totalUnidades),           'Unidades',        null],
    [ICN.frio,     dual(frioL.length,palletsFrio),'Cadena frío',     null],
    [ICN.med, dual(med.c,med.p), 'Medicamento',     'MEDICAMENTO'],
    [ICN.mq,  dual(mq.c,mq.p),   'MQ',              'MEDICO QUIRURGICO'],
    [ICN.lab, dual(lab.c,lab.p), 'Laboratorio',     'LABORATORIO'],
    [ICN.odo, dual(odo.c,odo.p), 'Odontología',     'ODONTOLOGIA'],
    [ICN.sus, dual(sus.c,sus.p), 'Sus. controlada', 'SUSTANCIAS CONTROLADAS']
  ];
  const cont=document.getElementById('metrics');
  cont.innerHTML=cards.map(x=>{
    const clickable=x[3]?' clickable':'';
    const activa=(x[3]&&AREA_SEL===x[3])?' activa':'';
    const attr=x[3]?(' data-area="'+esc(x[3])+'" title="Filtrar por '+esc(catCorta(x[3]))+'"'):'';
    return '<div class="metric'+clickable+activa+'"'+attr+'><span class="ic">'+x[0]+'</span><div>'+x[1]+'<div class="l">'+x[2]+'</div></div></div>';
  }).join('');
  // Wiring de filtro por tarjeta de área (clic en activa = quitar filtro)
  cont.querySelectorAll('.metric.clickable').forEach(el=>{
    el.addEventListener('click',()=>{
      const a=el.dataset.area;
      AREA_SEL=(AREA_SEL===a)?'':a;
      refrescarTodo();
    });
  });
}

// Lista para conteos por área: período + búsqueda, sin filtro de área
function citasBaseArea(){
  const modo=document.getElementById('modo').value;
  const q=(document.getElementById('buscar').value||'').toLowerCase().trim();
  const pasaBusqueda=(s)=>{ if(!q) return true; const b=((s.empresa||'')+' '+(s.oc||'')+' '+(s.cod_abasto||'')+' '+(s.descripcion||'')).toLowerCase(); return b.indexOf(q)>=0; };
  if(modo==='dia'){
    const f=document.getElementById('fechaDia').value;
    return CITAS.filter(s=>pasaBusqueda(s) && (s.fecha_confirmada||'').slice(0,10)===f);
  } else {
    const i=document.getElementById('fechaIni').value, fn=document.getElementById('fechaFin').value;
    return CITAS.filter(s=>{ const f=(s.fecha_confirmada||'').slice(0,10); return pasaBusqueda(s) && f>=i && f<=fn; });
  }
}

/* ===== Gráfico semanal ===== */
// Citas de la semana laboral (Lun–Sáb) del día seleccionado: área + búsqueda, sin filtro de un solo día
function citasSemana(){
  const base=document.getElementById('fechaDia').value;
  const ref=new Date(base+'T12:00:00');
  const lun=new Date(ref); const dw=ref.getDay(); lun.setDate(ref.getDate()+(dw===0?-6:1-dw));
  const sab=new Date(lun); sab.setDate(lun.getDate()+5);
  const iL=isoLocal(lun), iS=isoLocal(sab);
  const q=(document.getElementById('buscar').value||'').toLowerCase().trim();
  const pasaBusqueda=(s)=>{ if(!q) return true; const b=((s.empresa||'')+' '+(s.oc||'')+' '+(s.cod_abasto||'')+' '+(s.descripcion||'')).toLowerCase(); return b.indexOf(q)>=0; };
  return CITAS.filter(s=>{
    if(AREA_SEL && catNombre(s.categoria)!==AREA_SEL) return false;
    if(!pasaBusqueda(s)) return false;
    const f=(s.fecha_confirmada||'').slice(0,10);
    return f>=iL && f<=iS;
  });
}

function renderChart(){
  const modo=document.getElementById('modo').value;
  let labels=[], citasArr=[], palletsArr=[];

  if(modo==='rango'){
    const lista=citasPeriodo();
    const fechas=[...new Set(lista.map(s=>(s.fecha_confirmada||'').slice(0,10)).filter(Boolean))].sort();
    fechas.forEach(f=>{
      const arr=lista.filter(s=>(s.fecha_confirmada||'').slice(0,10)===f);
      const [y,m,d]=f.split('-').map(Number);
      labels.push(d+'-'+MES[m-1]);
      citasArr.push(arr.length);
      palletsArr.push(arr.reduce((t,s)=>t+Number(s.cant_pallets||0),0));
    });
  } else {
    // Modo Día: el gráfico muestra SIEMPRE la semana laboral completa (Lun–Sáb)
    // del día seleccionado, no solo el día. Así nunca aparece una sola columna.
    const lista=citasSemana();
    const base=document.getElementById('fechaDia').value;
    const ref=new Date(base+'T12:00:00');
    const lun=new Date(ref); const dw=ref.getDay(); lun.setDate(ref.getDate()+(dw===0?-6:1-dw));
    const dias=[];
    for(let i=0;i<6;i++){ const d=new Date(lun); d.setDate(lun.getDate()+i); dias.push(isoLocal(d)); labels.push(DIAS[d.getDay()].slice(0,3)+' '+d.getDate()); citasArr.push(0); palletsArr.push(0); }
    lista.forEach(s=>{ const f=(s.fecha_confirmada||'').slice(0,10); const ix=dias.indexOf(f); if(ix>=0){ citasArr[ix]++; palletsArr[ix]+=Number(s.cant_pallets||0); } });
    // Resaltar la barra del día seleccionado dentro de la semana
    var selIx=dias.indexOf(base);
    var coloresBar=dias.map(function(_,i){ return i===selIx ? '#0C447C' : '#9db8d6'; });
  }

  // En modo rango todas las barras van con el azul institucional pleno
  var barColors = (modo==='rango') ? '#1e5a9e' : (typeof coloresBar!=='undefined' ? coloresBar : '#1e5a9e');

  // Etiqueta del período mostrado en el encabezado del gráfico
  var pElem=document.getElementById('chartPeriodo');
  if(pElem){
    if(modo==='rango'){
      pElem.textContent='';
    } else {
      var base2=document.getElementById('fechaDia').value;
      var ref2=new Date(base2+'T12:00:00');
      var lun2=new Date(ref2); var dw2=ref2.getDay(); lun2.setDate(ref2.getDate()+(dw2===0?-6:1-dw2));
      var sab2=new Date(lun2); sab2.setDate(lun2.getDate()+5);
      pElem.textContent='Semana '+lun2.getDate()+'–'+sab2.getDate()+' '+MES[sab2.getMonth()];
    }
  }

  const ctx=document.getElementById('cargaChart').getContext('2d');
  if(chart) chart.destroy();
  chart=new Chart(ctx,{
    data:{ labels:labels, datasets:[
      { type:'bar', label:'Citas', data:citasArr, backgroundColor:barColors, yAxisID:'y', borderRadius:3 },
      { type:'line', label:'Pallets', data:palletsArr, borderColor:'#A32D2D', backgroundColor:'#A32D2D', yAxisID:'y1', tension:.3, pointRadius:3 }
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ boxWidth:12, font:{size:11} } } },
      scales:{
        y:{ position:'left', beginAtZero:true, ticks:{ precision:0, font:{size:10} }, title:{display:true,text:'Citas',font:{size:10}} },
        y1:{ position:'right', beginAtZero:true, grid:{drawOnChartArea:false}, ticks:{ precision:0, font:{size:10} }, title:{display:true,text:'Pallets',font:{size:10}} },
        x:{ ticks:{ font:{size:10} } }
      }
    }
  });
}

/* ===== Tarjeta densa (2 filas) ===== */
function badges(s){
  let b=''; const cat=catCorta(s.categoria);
  if(cat) b+='<span class="pill pill-cat">'+esc(cat)+'</span>';
  if(esFrio(s)) b+='<span class="pill pill-frio">Cadena frío</span>';
  if(s.es_controlado) b+='<span class="pill pill-ctrl">Controlado</span>';
  const sg=infoSeg(s); if(sg) b+='<span class="pill pill-seg">'+esc(sg)+'</span>';
  return b;
}
function estadoClase(e){
  const x=String(e||'').toUpperCase().replace(/ /g,'_');
  const known=['AGENDADA','ASISTIO','NO_ASISTIO','DIFERIDA','REPROGRAMADA'];
  return known.includes(x)?('est-'+x):'est-default';
}
function tarjeta(s){
  const venc=(s.venc&&s.venc.fecha)?s.venc.fecha:(s.fecha_vencimiento?fechaCorta(s.fecha_vencimiento):'');
  const di=(lab,val,mono)=>'<div class="di"><span class="lab">'+lab+'</span><div class="val'+(mono?' mono':'')+' trunc" title="'+esc(val)+'">'+esc(val||'—')+'</div></div>';
  return ''+
    '<div class="cita">'+
      '<div class="cita-top">'+
        '<span class="cita-hora">'+esc(hhmm(s.hora_confirmada))+'</span>'+
        '<span class="cita-fecha">'+esc(fechaCorta(s.fecha_confirmada))+'</span>'+
        '<span class="cita-estado '+estadoClase(s.estado)+'">'+esc(String(s.estado||'AGENDADA'))+'</span>'+
        '<span class="cita-emp trunc" title="'+esc(s.empresa||'')+'">'+esc(s.empresa||'Proveedor no especificado')+'</span>'+
      '</div>'+
      /* Fila 1 */
      '<div class="det det-1">'+
        di('Producto', s.descripcion)+
        di('Renglón', s.cod_abasto, true)+
        di('Cant.', num(s.cant_unidades), true)+
        di('Bultos', num(s.cant_bultos), true)+
        di('Pallets', num(s.cant_pallets), true)+
        di('Ambiente', s.tipo_ambiente)+
      '</div>'+
      /* Fila 2 */
      '<div class="det det-2">'+
        di('Persona/Empresa entrega', s.personal_entrega)+
        di('OC', s.oc, true)+
        di('Solicitante', s.solicitante)+
        di('Teléfono', s.telefono, true)+
        di('Unidad móvil', s.unidad_movil)+
        di('Vence', venc, true)+
      '</div>'+
      (badges(s)?'<div class="badges-row">'+badges(s)+'</div>':'')+
    '</div>';
}

/* ===== Render panel principal (agrupado por día) ===== */
function renderPrincipal(){
  const cont=document.getElementById('contenido');
  const lista=citasPeriodo();
  if(!lista.length){ cont.innerHTML='<div class="vacio">No hay citas agendadas'+(AREA_SEL?' en '+esc(catCorta(AREA_SEL)):'')+' para este período.</div>'; return; }
  const porDia={}; lista.forEach(s=>{ const f=(s.fecha_confirmada||'').slice(0,10)||'sin'; (porDia[f]=porDia[f]||[]).push(s); });
  let html='';
  Object.keys(porDia).sort().forEach(f=>{
    const arr=porDia[f].sort((a,b)=>String(a.hora_confirmada||'').localeCompare(String(b.hora_confirmada||'')));
    const pal=arr.reduce((t,s)=>t+Number(s.cant_pallets||0),0);
    html+='<div class="grupo"><div class="grupo-cab">'+esc(fechaLegible(f))+
      '<span class="cuenta">'+arr.length+' cita'+(arr.length>1?'s':'')+' · '+num(pal)+' pallets</span></div>'+
      arr.map(tarjeta).join('')+'</div>';
  });
  cont.innerHTML=html;
}

/* ===== Render panel próximos días ===== */
function renderProximos(){
  const cont=document.getElementById('proximos');
  const lista=citasProximas();
  if(!lista.length){ cont.innerHTML='<div class="vacio">No hay citas en los próximos días.</div>'; return; }
  const porDia={}; lista.forEach(s=>{ const f=(s.fecha_confirmada||'').slice(0,10)||'sin'; (porDia[f]=porDia[f]||[]).push(s); });
  let html='';
  Object.keys(porDia).sort().forEach(f=>{
    const arr=porDia[f].sort((a,b)=>String(a.hora_confirmada||'').localeCompare(String(b.hora_confirmada||'')));
    html+='<div class="prox-item"><div class="prox-fecha">'+esc(fechaLegible(f))+'</div>'+
      '<div class="prox-cant">'+arr.length+' cita(s) programada(s)</div>'+
      arr.map(s=>'<div class="prox-cita"><div class="e">'+esc(s.empresa||'Proveedor')+'</div>'+
        '<div class="m">'+esc(hhmm(s.hora_confirmada))+' · '+esc(catCorta(s.categoria))+'</div>'+
        '<div class="m"><b>Producto:</b> '+esc(s.descripcion||'—')+'</div></div>').join('')+
      '</div>';
  });
  cont.innerHTML=html;
}

/* ===== Orquestación ===== */
function refrescarTodo(){
  const listaMetricas=citasPeriodo();
  renderMetricas(listaMetricas);
  renderChart();
  renderPrincipal();
  if(document.getElementById('modo').value==='dia') renderProximos();
}

/* ===== Inicialización ===== */
function init(){
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const haceSem=new Date(hoy); haceSem.setDate(hoy.getDate()-7);
  document.getElementById('fechaDia').value=isoLocal(hoy);
  document.getElementById('fechaIni').value=isoLocal(haceSem);
  document.getElementById('fechaFin').value=isoLocal(hoy);

  document.getElementById('modo').addEventListener('change',cambiarModo);
  document.getElementById('fechaDia').addEventListener('change',()=>{ if(CARGADO) refrescarTodo(); });
  document.getElementById('fechaIni').addEventListener('change',()=>{ if(CARGADO) refrescarTodo(); });
  document.getElementById('fechaFin').addEventListener('change',()=>{ if(CARGADO) refrescarTodo(); });
  document.getElementById('buscar').addEventListener('input',()=>{ if(CARGADO) refrescarTodo(); });
  document.getElementById('btnRefrescar').addEventListener('click',cargar);
  document.getElementById('btnLimpiar').addEventListener('click',limpiar);

  // Ícono SVG del encabezado del gráfico
  document.getElementById('icChart').innerHTML=ICN.chart;

  cargar();
}
function limpiar(){
  AREA_SEL='';
  document.getElementById('modo').value='dia';
  document.getElementById('buscar').value='';
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const haceSem=new Date(hoy); haceSem.setDate(hoy.getDate()-7);
  document.getElementById('fechaDia').value=isoLocal(hoy);
  document.getElementById('fechaIni').value=isoLocal(haceSem);
  document.getElementById('fechaFin').value=isoLocal(hoy);
  cambiarModo();
  if(CARGADO) refrescarTodo();
}

window.addEventListener('beforeinstallprompt',(e)=>{ e.preventDefault(); dp=e; const b=document.getElementById('btnInstalar'); if(b) b.style.display='block'; });
document.getElementById('btnInstalar').addEventListener('click',async()=>{ if(!dp)return; dp.prompt(); await dp.userChoice; dp=null; document.getElementById('btnInstalar').style.display='none'; });
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }

init();
